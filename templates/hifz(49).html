{% raw %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hifz">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
<title>Hifz — Quran Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{
  overscroll-behavior: none;
  --teal-950:#0a1f1e;--teal-900:#0d2b29;--teal-800:#103d3a;--teal-700:#155550;
  --teal-600:#1a6e67;--teal-500:#208a81;--teal-400:#2aada2;--teal-300:#4dc9bc;
  --teal-200:#80ddd6;
  --gold-700:#8a5200;--gold-500:#c97d0a;--gold-400:#e09520;--gold-300:#f0b040;
  --gold-200:#f7cc7a;
  --green-600:#1a6e3a;--green-500:#22874a;--green-400:#2da85e;--green-300:#4dc97a;
  --green-200:#80dda0;
  --navy-700:#1a2a4a;--navy-600:#1e3460;--navy-500:#254080;--navy-400:#3355a0;--navy-300:#6688cc;
  --cream:#f5f0e8;--err:#e05a5a;--err-bg:#2d1010;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--teal-950);color:var(--cream);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex;flex:1;overflow:hidden}
h1,h2{font-family:'Playfair Display',serif}
h1{font-size:2.2rem;font-weight:700;line-height:1.2}
h2{font-size:1.4rem;font-weight:600}
h3{font-size:1.05rem;font-weight:600}
.label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal-300);margin-bottom:6px}
.muted{color:var(--teal-300);font-size:0.875rem}
.arabic{font-size:1.3rem;direction:rtl;font-weight:400;color:var(--teal-200);line-height:1.6}
.card{background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r-lg);padding:20px}
button{font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;border:none;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--r);font-size:0.9rem;font-weight:500}
.btn-primary{background:var(--gold-400);color:var(--teal-950);font-weight:600}
.btn-primary:hover{background:var(--gold-300);transform:translateY(-1px)}
.btn-secondary{background:var(--teal-800);color:var(--cream);border:1px solid var(--teal-600)}
.btn-secondary:hover{background:var(--teal-700);border-color:var(--teal-400)}
.btn-ghost{background:transparent;color:var(--teal-300);padding:8px 12px;border-radius:var(--r-sm)}
.btn-ghost:hover{background:var(--teal-800);color:var(--cream)}
.btn-danger{background:var(--err-bg);color:var(--err);border:1px solid rgba(224,90,90,0.3)}
.btn-danger:hover{background:rgba(224,90,90,0.2)}
.btn-sm{padding:8px 16px;font-size:0.8rem}
.btn-full{width:100%}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
input,textarea,select{
  font-family:'Inter',sans-serif;background:var(--teal-800);border:1px solid var(--teal-600);
  border-radius:var(--r-sm);color:var(--cream);font-size:0.9rem;padding:10px 14px;
  width:100%;transition:border-color 0.15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold-400)}
input::placeholder,textarea::placeholder{color:var(--teal-400)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
select option{background:var(--teal-800)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-gold{background:rgba(224,149,32,0.15);color:var(--gold-300);border:1px solid rgba(224,149,32,0.3)}
.badge-teal{background:rgba(42,173,162,0.15);color:var(--teal-300);border:1px solid rgba(42,173,162,0.3)}
.bottom-nav{display:flex;background:var(--teal-900);border-top:1px solid var(--teal-700);position:sticky;bottom:0;z-index:100;padding-bottom:env(safe-area-inset-bottom, 0px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 14px;background:transparent;color:var(--teal-400);font-size:10px;font-weight:500;letter-spacing:0.04em;transition:color 0.15s;border-top:2px solid transparent}
.nav-item.active{color:var(--gold-300);border-top-color:var(--gold-400)}
.nav-item svg{width:20px;height:20px}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top, 0px));background:var(--teal-900);border-bottom:1px solid var(--teal-800);position:sticky;top:0;z-index:50}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold-300)}
.streak-pill{flex:1;background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r);padding:12px 14px}
.streak-num{font-size:1.5rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold-300)}
.streak-label{font-size:10px;color:var(--teal-400);margin-top:2px}
.surah-due-card{background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.18s}
.surah-due-card:hover{border-color:var(--gold-500);background:var(--teal-700)}
.surah-due-card.urgent{border-color:rgba(224,90,90,0.4)}
.surah-num-badge{width:36px;height:36px;border-radius:50%;background:var(--teal-700);border:1px solid var(--teal-600);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--teal-200);flex-shrink:0}
.urgency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-overdue{background:var(--err)}.dot-today{background:var(--gold-400)}.dot-soon{background:var(--teal-400)}
.quality-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.quality-btn{background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px 6px;text-align:center;color:var(--cream);font-size:0.85rem;font-weight:500;transition:all 0.18s;cursor:pointer}
.quality-btn:hover{transform:translateY(-2px)}
.q-1{border-color:rgba(224,90,90,0.6)}.q-1:hover,.q-1.sel{background:rgba(224,90,90,0.18);border-color:var(--err)}
.q-2{border-color:rgba(224,90,90,0.35)}.q-2:hover,.q-2.sel{background:rgba(224,90,90,0.1);border-color:var(--err)}
.q-3{border-color:rgba(240,176,64,0.4)}.q-3:hover,.q-3.sel{background:rgba(240,176,64,0.1);border-color:var(--gold-300)}
.q-4{border-color:rgba(45,168,94,0.35)}.q-4:hover,.q-4.sel{background:rgba(45,168,94,0.12);border-color:var(--green-300)}
.q-5{border-color:rgba(45,168,94,0.55)}.q-5:hover,.q-5.sel{background:rgba(45,168,94,0.18);border-color:var(--green-300)}

/* ── STATUS COLOURS ── */
/* good = green, ok = gold/yellow, bad = red, notsure = dark navy-blue */
.s-good{background:rgba(45,168,94,0.18);border-color:var(--green-400)!important;color:var(--green-200)!important}
.s-ok{background:rgba(240,176,64,0.15);border-color:var(--gold-400)!important;color:var(--gold-200)!important}
.s-bad{background:rgba(224,90,90,0.15);border-color:var(--err)!important;color:#f09090!important}
.s-notsure{background:rgba(51,85,160,0.25);border-color:var(--navy-400)!important;color:var(--navy-300)!important}

/* status pill buttons */
.spill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--teal-700);background:transparent;color:var(--teal-400);transition:all 0.15s;white-space:nowrap}
.spill:hover{color:var(--cream)}
.spill.sp-good{background:rgba(45,168,94,0.18);border-color:var(--green-400);color:var(--green-200)}
.spill.sp-ok{background:rgba(240,176,64,0.15);border-color:var(--gold-400);color:var(--gold-200)}
.spill.sp-bad{background:rgba(224,90,90,0.15);border-color:var(--err);color:#f09090}
.spill.sp-notsure{background:rgba(51,85,160,0.25);border-color:var(--navy-400);color:var(--navy-300)}

.surah-list-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--teal-900);border:1px solid var(--teal-800);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.surah-list-item:hover{border-color:var(--teal-600);background:var(--teal-800)}
.status-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.bar-none{background:var(--teal-700)}.bar-good{background:var(--green-400)}.bar-ok{background:var(--gold-400)}.bar-bad{background:var(--err)}.bar-due{background:var(--gold-300)}
.achievement{display:flex;align-items:center;gap:12px;padding:14px;background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r);margin-bottom:8px}
.ach-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ach-locked{opacity:0.3;filter:grayscale(1)}
.ach-unlocked .ach-icon{border:1px solid var(--gold-500);background:rgba(224,149,32,0.1)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:24px 20px 36px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--teal-600);margin:0 auto 20px}
.prog-bar-wrap{background:var(--teal-800);border-radius:4px;height:6px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:4px;background:var(--gold-400);transition:width 0.5s}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-top:16px}
.celebrate{position:fixed;inset:0;pointer-events:none;z-index:999}
.celebrate.hidden{display:none}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall 2s forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--teal-700);border-radius:2px}
@keyframes hexFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-4px)}}
.auth-input-wrap{position:relative;margin-bottom:12px}
.auth-input-wrap input{padding-right:40px}
.field-err{font-size:11px;color:var(--err);margin-top:-8px;margin-bottom:10px;display:none}
.field-err.show{display:block}
.auth-divider{text-align:center;color:var(--teal-600);font-size:12px;margin:16px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--teal-800)}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--teal-800);gap:12px}
.ai-result{background:var(--teal-800);border:1px solid var(--gold-700);border-radius:var(--r);padding:16px;margin-top:12px}
.ai-score-display{font-size:2.5rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold-300)}
.tab-row{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--teal-700);border-radius:var(--r-sm);overflow:hidden}
.tab{flex:1;padding:10px;text-align:center;background:transparent;color:var(--teal-400);font-size:0.85rem;font-weight:500;transition:all 0.15s}
.tab.active{background:var(--teal-700);color:var(--cream)}
.split-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(240,176,64,0.12);color:var(--gold-300);border:1px solid rgba(240,176,64,0.25)}
.next-tag{font-size:11px;color:var(--teal-400);margin-top:2px}
.next-tag.overdue{color:var(--err)}.next-tag.today{color:var(--gold-300)}
.page-scroll{flex:1;overflow-y:auto;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;padding:0 20px 20px}

/* ── CHECKBOX ── */
.cb{
  width:20px;height:20px;border-radius:5px;border:2px solid var(--teal-600);
  background:transparent;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.cb.checked{background:var(--gold-400);border-color:var(--gold-400)}
.cb.checked::after{content:'✓';font-size:12px;font-weight:700;color:var(--teal-950)}
.cb.partial{background:transparent;border-color:var(--gold-500)}
.cb.partial::after{content:'–';font-size:14px;font-weight:700;color:var(--gold-400)}

/* ── JUZ ACCORDION ── */
.juz-row{
  background:var(--teal-900);border:1px solid var(--teal-800);
  border-radius:var(--r);margin-bottom:6px;overflow:hidden;
}
.juz-header{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;user-select:none;
}
.juz-header:hover{background:rgba(255,255,255,0.03)}
.juz-title{flex:1;font-weight:600;font-size:0.92rem}
.juz-meta{font-size:11px;color:var(--teal-400)}
.juz-arrow{color:var(--teal-500);font-size:14px;transition:transform 0.2s;flex-shrink:0}
.juz-arrow.open{transform:rotate(90deg)}
.juz-surahs{display:none;border-top:1px solid var(--teal-800)}
.juz-surahs.open{display:block}
.surah-row-ob{
  display:flex;align-items:center;gap:10px;padding:10px 14px 10px 38px;
  border-bottom:1px solid var(--teal-800);
}
.surah-row-ob:last-child{border-bottom:none}
.surah-row-ob:hover{background:rgba(255,255,255,0.02)}
.surah-row-ob-info{flex:1;min-width:0}
.surah-row-ob-name{font-size:0.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.surah-row-ob-meta{font-size:10px;color:var(--teal-500);margin-top:1px}
.status-pills{display:flex;gap:4px;flex-wrap:wrap}

/* parts section inside surah row */
.parts-section{padding:8px 14px 10px 38px;background:rgba(0,0,0,0.15);border-top:1px solid var(--teal-800)}
.part-row-ob{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.part-row-ob:last-child{margin-bottom:0}
.part-inputs{display:flex;gap:6px;flex:1;align-items:center}
.part-inputs input{padding:6px 10px;font-size:12px}
.part-num-label{font-size:11px;color:var(--teal-400);min-width:50px}

/* ── INTRO ── */
#screen-intro{position:fixed;inset:0;z-index:9999;background:var(--teal-950);display:flex;flex-direction:column;align-items:center;justify-content:center}
#screen-intro.done{display:none}
.intro-glow{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(224,149,32,0.12) 0%,transparent 70%);animation:glowPulse 3s ease infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
.intro-logo{font-family:'Playfair Display',serif;font-size:4.5rem;font-weight:700;color:transparent;background:linear-gradient(135deg,var(--gold-300),var(--gold-500),var(--gold-200));-webkit-background-clip:text;background-clip:text;opacity:0;animation:introLogo 1.8s cubic-bezier(.16,1,.3,1) 0.3s forwards;letter-spacing:0.04em}
.intro-sub{font-size:0.85rem;color:var(--teal-300);opacity:0;letter-spacing:0.16em;animation:introSub 1s ease 1.4s forwards;margin-top:10px;text-transform:uppercase}
@keyframes introLogo{0%{opacity:0;transform:translateY(24px) scale(0.94);filter:blur(10px)}60%{opacity:1;filter:blur(0);transform:translateY(0) scale(1.02)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes introSub{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:none}}
@keyframes introFadeOut{0%{opacity:1}100%{opacity:0;pointer-events:none}}
.intro-fade-out{animation:introFadeOut 0.55s ease forwards}

/* ── PROFILE ── */
.profile-option{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--teal-900);border:1px solid var(--teal-800);border-radius:var(--r);cursor:pointer;transition:all 0.15s;font-size:0.9rem;font-weight:500;margin-bottom:8px}
.profile-option:hover{border-color:var(--teal-600);background:var(--teal-800)}
.profile-option.selected{border-color:var(--gold-400);background:rgba(224,149,32,0.08);color:var(--gold-200)}
.po-icon{font-size:1.3rem;width:32px;text-align:center;flex-shrink:0}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--teal-700);transition:all 0.3s}
.step-dot.active{width:20px;border-radius:3px;background:var(--gold-400)}
.step-dot.done{background:var(--teal-400)}

/* range editor in detail modal */
.range-row{display:grid;grid-template-columns:1fr 68px 68px 28px;gap:6px;align-items:center;margin-bottom:6px}
.range-row input{padding:7px 10px;font-size:0.82rem}
</style>
</head>
<body>
<div id="app">

<!-- INTRO -->
<div id="screen-intro">
  <div class="intro-glow"></div>
  <div class="intro-logo">Hifz</div>
  <div class="intro-sub">Quran Revision</div>
</div>

<!-- ONBOARDING -->
<div id="screen-onboard" class="screen" style="padding:0">
  <div style="flex:1;overflow-y:auto;padding:32px 20px 48px;max-width:560px;margin:0 auto;width:100%" id="onboard-inner"></div>
</div>

<!-- MAIN APP -->
<div id="screen-main" class="screen" style="padding:0">
  <div class="top-bar">
    <div class="logo">Hifz</div>
    <div style="display:flex;align-items:center;gap:8px" id="header-streaks"></div>
  </div>
  <div id="page-today" class="page-scroll" style="display:flex;flex-direction:column"></div>
  <div id="page-surahs" class="page-scroll" style="display:none;flex-direction:column"></div>
  <div id="page-stats" class="page-scroll" style="display:none;flex-direction:column"></div>
  <div id="page-settings" class="page-scroll" style="display:none;flex-direction:column"></div>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="showPage('today')" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>TODAY
    </button>
    <button class="nav-item" onclick="showPage('surahs')" id="nav-surahs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>SURAHS
    </button>
    <button class="nav-item" onclick="showPage('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>PROGRESS
    </button>
    <button class="nav-item" onclick="showPage('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>SETTINGS
    </button>

const SURAH_DESC = {
1: "Al-Fatihah is the opening of the Quran and the most repeated surah in the prayer, recited at least 17 times a day. It is a complete supplication, moving from praise of Allah to acknowledgement of His lordship to a sincere request for guidance. The Prophet (ﷺ) said: 'There is no prayer for the one who does not recite the Opening of the Book.' (Bukhari). It is also known as Umm al-Quran, the Mother of the Quran, for it contains the essence of the entire revelation.",

2: "Al-Baqarah is the longest surah in the Quran and a fortress in itself. It covers the foundations of faith, law, stories of the Children of Israel, and guidance for every aspect of life. The Prophet (ﷺ) said: 'Recite Al-Baqarah, for taking it is a blessing and leaving it is a regret, and the magicians cannot withstand it.' (Muslim). It contains Ayat al-Kursi, the greatest verse, and closes with two verses the Prophet (ﷺ) described as a light granted to no prophet before him.",

3: "Ali Imran follows Al-Baqarah as its companion, and together they are known as the Zahrawan, the Two Bright Ones. The Prophet (ﷺ) said: 'Recite the two bright ones, Al-Baqarah and Al Imran, for they will come on the Day of Resurrection like two clouds or two shades, or two flocks of birds in ranks, pleading for those who recite them.' (Muslim). The surah addresses the People of the Book, defends the truth of Islam, and draws lessons from the Battle of Uhud.",

4: "An-Nisa is a detailed surah revealed in Madinah addressing the rights of women, orphans, inheritance, marriage, and justice. It was revealed after Uhud when many women became widows and the community needed clear guidance. It emphasises the importance of trusting leadership, maintaining family ties, and treating those under your care with fairness and compassion.",

5: "Al-Maidah was one of the last surahs revealed to the Prophet (ﷺ), making its rulings among the most binding. It addresses the lawful and unlawful in food, the completion of religion, the covenant with the People of the Book, and justice. Allah said in it: 'This day I have perfected your religion for you.' It also tells the story of the disciples of Isa (AS) who asked for a table spread from heaven.",

6: "Al-Anam was revealed all at once in Makkah, according to reports accompanied by 70,000 angels. It is a powerful refutation of polytheism, addressing those who associated partners with Allah and dismantling their arguments. It also lays out a set of fundamental moral principles that echo the Ten Commandments, making it one of the most comprehensive ethical chapters in the Quran.",

7: "Al-Araf takes its name from the heights between Paradise and Hellfire, where certain people will stand on the Day of Judgement. It tells the stories of many prophets sent to their nations: Nuh, Hud, Salih, Lut, and Shuayb, drawing the recurring lesson that nations rise and fall based on their response to divine guidance. It also narrates the story of Adam and Iblis in vivid detail.",

8: "Al-Anfal was revealed after the Battle of Badr, the first major military encounter of the early Muslim community. It addresses the distribution of war spoils, the ethics of battle, the qualities of true believers, and Allah's role in granting victory to the outnumbered Muslims. It is a surah of tawakkul, trust in Allah, and a reminder that victory comes from Him alone.",

9: "At-Tawbah is unique as the only surah not preceded by Bismillah. Scholars say this is because it was revealed with the sword, carrying a tone of ultimatum and warning to those who broke their covenants. It addresses the hypocrites, the polytheists, and those who stayed behind from Tabuk. Yet it also contains one of the most beautiful verses of repentance: 'Allah has turned in mercy to the Prophet, the Muhajirun, and the Ansar.'",

10: "Yunus is a Makkan surah addressing the doubters of prophethood and resurrection. It tells the story of Yunus (AS), who was swallowed by a whale after leaving his people without permission, and whose heartfelt repentance from the darkness of the belly was accepted. It reminds us that faith accepted only at the moment of seeing punishment is not true faith, and that divine mercy is always available to those who turn sincerely.",

11: "Hud narrates the stories of seven prophets: Nuh, Hud, Salih, Ibrahim, Lut, Shuayb, and Musa, each calling their people to tawhid and each being rejected. The surah is known for being among those that gave the Prophet (ﷺ) grey hairs. When asked why, he recited the verse: 'So stand firm as you have been commanded.' (Tirmidhi). It is a surah of istiqamah, steadfastness on the straight path.",

12: "Yusuf is the only surah dedicated to a single, uninterrupted story. It tells the life of Yusuf (AS), from his childhood dream to the jealousy of his brothers, his imprisonment, his interpretation of dreams, and his eventual rise to power in Egypt. Allah called it 'the best of stories.' It is a surah of patience, dignity in adversity, and the certainty that Allah's plan always leads to a beautiful end.",

13: "Ar-Rad, named after the sound of thunder which glorifies Allah, addresses the doubters who demanded miracles as proof of prophethood. It emphasises Allah's knowledge, His control over all creation, and the certainty of His promise. It contains the famous verse: 'Verily, with the remembrance of Allah do hearts find rest,' one of the most quoted and memorised verses in the Quran.",

14: "Ibrahim is a Makkan surah of profound gratitude and supplication. It narrates Ibrahim's prayer for his descendants, his thanks for guidance, and his plea that his children be established in prayer. It also describes the two trees of deeds: the good word like a good tree with firm roots and branches reaching the sky, and the bad word like a tree uprooted from the earth with no stability.",

15: "Al-Hijr is named after the rocky region where the people of Thamud lived. It begins by affirming that the Quran is under divine protection, a guarantee from Allah Himself: 'Indeed, it is We who sent down the Quran and indeed, We will be its guardian.' It also tells the story of the angels visiting Ibrahim and then going to Lut's people, and reminds the Prophet (ﷺ) not to grieve over those who reject.",

16: "An-Nahl, the Bee, draws attention to Allah's signs in creation, from the bee's guidance to build its home and produce honey, to the provision of livestock, ships, rain, and shadow. It then contrasts those who are grateful with those who deny. It also contains an important verse about returning matters of dispute to Allah and His messenger, and a beautifully comprehensive verse commanding justice, good conduct, and giving to relatives.",

17: "Al-Isra opens with the miraculous night journey of the Prophet (ﷺ) from Makkah to Jerusalem and then to the heavens. It contains seventeen foundational moral commands covering worship, family, honesty, and humility. It also addresses the story of Iblis's refusal to prostrate to Adam and his long-term plan to mislead humanity. The surah ends with a reminder that the Quran itself is a healing and mercy for believers.",

18: "Al-Kahf is one of the most beloved surahs in the Quran. It tells four timeless stories: the People of the Cave, the man with two gardens, Musa and Khidr, and Dhul-Qarnayn, each a lesson about trials of faith, wealth, knowledge, and power. The Prophet (ﷺ) said: 'Whoever reads Surah Al-Kahf on Friday will have a light that shines for him between the two Fridays.' (Al-Hakim, graded sahih). He also said that the first ten verses protect against the Dajjal (Muslim).",

19: "Maryam is a surah of miraculous births and divine mercy. It tells the stories of Zakariyya (AS) who was granted a son in old age, Maryam who gave birth as a virgin, Ibrahim who left his idol-worshipping father with gentleness and love, and others who remained steadfast. When the early Muslims recited this surah to the Negus of Abyssinia, he and his bishops wept at its beauty.",

20: "Ta-Ha was revealed to ease the Prophet (ﷺ) at a difficult time, with the opening: 'We have not sent down the Quran to you to cause you distress.' It tells the story of Musa (AS) in remarkable detail, from his encounter with Allah at the burning bush, to his mission to Pharaoh, to the trial with the Samaritan who led the people to worship the golden calf. It is said that Umar ibn al-Khattab embraced Islam after hearing this surah.",

21: "Al-Anbiya presents a gallery of 18 prophets, each affirming tawhid and facing rejection from their people. It emphasises that all prophets shared one message, one ummah, and one Lord. It includes the prayer of Yunus from within the whale, Ibrahim's miraculous survival from the fire, and Zakariyya's supplication for a child. The surah closes with a reminder that the earth will be inherited by those who are righteous.",

22: "Al-Hajj is unique in that it contains two verses of prostration. It addresses the pilgrimage, the resurrection, and the trial of faith, and it tells the story of Shaytan interfering with the wishes of prophets, which Allah then abrogates and corrects. It calls the believers to struggle in the way of Allah with sincerity, and it contains a moving description of those who will be shamed on the Day of Resurrection.",

23: "Al-Muminun opens with ten qualities of the true believer, qualities that lead to ultimate success. These include humility in prayer, avoiding idle talk, paying zakat, guarding one's chastity, and fulfilling trusts. It then moves through the creation of man, the stories of Nuh and the prophets after him, and the certainty of the resurrection. The surah closes with a powerful supplication asking for forgiveness and mercy.",

24: "An-Nur was revealed in the context of the slander against Aisha (RA), known as the Ifk incident. It contains detailed rulings on modesty, slander, and the punishment for illicit relations. It also contains the famous Light Verse, describing Allah's light as a niche within which is a lamp. The surah commanded Muslim homes and hearts to be places of light, modesty, and purity.",

25: "Al-Furqan, the Criterion, opens by describing the Quran as a distinction between truth and falsehood. It refutes the objections of the disbelievers who mocked the Prophet (ﷺ) for being a man who eats and walks in markets. It then describes the qualities of the servants of the Most Merciful, Ibad al-Rahman, in one of the most beautiful passages of the Quran: those who walk humbly, speak peacefully, spend in balance, and spend the night in prayer.",

26: "Ash-Shuara, the Poets, tells the stories of Musa, Ibrahim, Nuh, Hud, Salih, Lut, and Shuayb in striking, rhythmic language. Each story ends with the same refrain: 'And your Lord is the Mighty, the Merciful,' hammering home the same conclusion. The surah ends by contrasting true revelation with the words of poets who wander in every valley and say what they do not do.",

27: "An-Naml, the Ant, is named after the ant who warned her colony before Sulayman's army approached, and Sulayman smiled at her words. It tells the stories of Musa, Sulayman, Salih, and Lut, and it contains one of the most celebrated accounts in the Quran: the visit of the Queen of Sheba, Bilqis, to Sulayman's court after receiving his letter. It also contains the longest verse beginning with Bismillah.",

28: "Al-Qasas gives the most detailed account of the story of Musa (AS), from his birth and placement in the river, to his upbringing in Pharaoh's palace, to his flight to Madyan, his marriage, and his return with prophethood. It also tells the story of Qarun, who was given immense wealth but was arrogant, and was swallowed by the earth. The surah addresses the Prophet (ﷺ) directly, promising that the One who gave him the Quran will return him to his homeland.",

29: "Al-Ankabut, the Spider, opens with a reminder that believers will be tested and that merely claiming faith is not enough. The spider's web, though elaborate in appearance, is the flimsiest of all homes, just as false beliefs seem structured but cannot protect. It tells the stories of Ibrahim, Lut, Shuayb, and others, and closes with a verse of hope: 'Those who strive in Our cause, We will surely guide them to Our ways.'",

30: "Ar-Rum begins with a remarkable prophecy: the Romans, who had recently been defeated by the Persians, would be victorious again within a few years. This came true, and it confirmed the truth of revelation to those who witnessed it. The surah then reflects on the signs in creation and history, the natural human disposition toward faith, and the certainty that Allah's promise never fails.",

31: "Luqman is named after a wise man, not a prophet, whose counsel to his son is recorded in the Quran. He advised his son not to associate partners with Allah, to honour his parents while maintaining boundaries in obedience, to establish prayer, to enjoin good and forbid evil, and not to walk arrogantly on the earth. His wisdom is timeless guidance from a father to a child, preserved in the Book of Allah.",

32: "As-Sajdah addresses the doubters of resurrection and the divine origin of the Quran. It contains a striking description of the creation of man from clay and the journey of the soul, and then a vivid contrast between the fate of the believer and the disbeliever on the Day of Judgement. It is recommended to recite As-Sajdah in Fajr prayer on Friday, alongside Al-Insan.",

33: "Al-Ahzab was revealed during and after the Battle of the Trench, one of the most difficult trials the early Muslim community faced. It addresses the Prophet's households and wives with special guidance, contains the famous verse on the Prophet (ﷺ) as the seal of prophethood, and includes the profound trust placed on man: 'We offered the Trust to the heavens, the earth, and the mountains, but they refused to bear it. Man bore it.'",

34: "Saba addresses those who denied the resurrection and mocked the promise of Allah. It tells the story of the kingdom of Sheba, blessed with abundance but ungrateful, whose people were scattered when the great dam of Marib collapsed. It also reflects on the gifts given to Dawud and Sulayman, and the ingratitude of those who should have been most thankful.",

35: "Fatir, the Originator, opens with one of the most majestic descriptions of Allah in the Quran: the Creator of the angels, with wings in pairs of two, three, and four. It calls humanity to reflect on the gifts of creation, warns against the deception of worldly life, and closes by dividing people into three categories in their relationship with the Quran: those who wrong themselves, those who are moderate, and those who excel in good.",

36: "Ya-Sin is often called the heart of the Quran. The Prophet (ﷺ) said: 'Everything has a heart, and the heart of the Quran is Ya-Sin. Whoever recites Ya-Sin, Allah records for him the reward of reciting the Quran ten times.' (Tirmidhi, with weakness noted but widely transmitted). It tells the story of the people of a city who rejected three messengers, the believing man who ran from the farthest end of the city to support them, and it contains a powerful affirmation of resurrection.",

37: "As-Saffat, the Rangers, opens with an oath by the angels who stand in rows, those who drive the clouds, and those who recite the remembrance of Allah. It then addresses the certainty of Allah's victory over evil, tells the story of Ibrahim and his willingness to sacrifice his son Ismail, the story of Yunus and his rescue from the whale, and ends with a declaration that the messengers will be victorious.",

38: "Sad opens with the Quran itself as evidence of truth, and tells the story of Dawud (AS) who was given wisdom and the ability to judge with fairness. It also tells the story of Sulayman whose love of horses distracted him, and of Ayyub (AS) whose patience under severe trial became a model for all time. The surah ends with Iblis being expelled and his declaration that he will mislead the children of Adam.",

39: "Az-Zumar, the Groups, addresses the pure sincerity that Allah requires in worship. It repeatedly emphasises that religion must be for Allah alone, and warns against associating partners with Him. It describes people being brought to the hellfire and paradise in groups, and contains one of the most hopeful verses in the Quran: 'Say: O My servants who have transgressed against yourselves, do not despair of the mercy of Allah. Indeed, Allah forgives all sins.'",

40: "Ghafir, also known as Al-Mumin, tells the story of a believing man from the family of Pharaoh who concealed his faith and defended Musa with wisdom and courage. His speech is recorded across several verses, a quiet man standing up in a tyrannical court. The surah emphasises Allah's attribute of forgiving sins and accepting repentance, and warns against the arrogance of those who dispute the signs of Allah.",

41: "Fussilat, meaning 'made clear,' emphasises the clarity and perfection of the Quran's guidance. It tells of the punishments of Ad and Thamud, describes how a person's own limbs will testify against them on the Day of Judgement, and contains the remarkable verse: 'We will show them Our signs in the horizons and within themselves until it becomes clear to them that it is the truth.'",

42: "Ash-Shura, the Consultation, addresses the divine origin of revelation and the nature of prophethood. It explains that Allah has revealed to all prophets the same essential message, and that what has divided people is their own disputes after the truth came to them. It also addresses the way believers handle their affairs through mutual consultation, and closes with a description of how Allah communicates with His creation.",

43: "Az-Zukhruf, the Ornaments, addresses the Arabs' attachment to the customs of their ancestors and their dismissal of the Prophet (ﷺ) for being an ordinary man. It tells the story of Ibrahim rejecting idolatry, of Musa being sent to Pharaoh, and of Isa (AS) whose message was distorted. The surah argues that the measure of a person is not their worldly ornaments but their standing with Allah.",

44: "Ad-Dukhan, the Smoke, refers to a sign that will appear before the Day of Judgement: a visible smoke that will cover people and cause them pain. It tells the story of the Egyptians and their punishment after they rejected Musa, and it describes the contrasting destinies of the people of paradise and hell with striking directness. It is recommended to recite this surah on Friday nights.",

45: "Al-Jathiyah, the Kneeling, describes every nation on its knees on the Day of Judgement, each being called to account by its record. It emphasises the signs in creation as evidence of Allah's sovereignty, and criticises those who follow only their desires with no guidance. The surah is also known as Ash-Shariah, referring to the divine law given to the prophets.",

46: "Al-Ahqaf is named after the sand dunes where the people of Ad lived before their destruction. It addresses the Prophet (ﷺ) with compassion, reminding him that previous messengers also faced rejection and that patience is the way of the prophets. It contains a touching account of a group of jinn who listened to the Quran being recited and immediately believed, then returned to their people to convey what they had heard.",

47: "Muhammad, also known as Al-Qital, was revealed in Madinah and addresses the believers preparing for battle. It calls them to firmness, reminds them of what is at stake, and warns the hypocrites whose true nature is exposed in times of trial. It describes paradise in vivid detail: rivers of water, milk, wine, and honey, and promises that those who die in the way of Allah will not find their deeds wasted.",

48: "Al-Fath was revealed after the Treaty of Hudaybiyyah, which appeared to many companions as a setback but which Allah called a clear victory. The surah opens: 'Indeed, We have given you a clear conquest.' It describes the acceptance of the believers' pledge of allegiance under the tree, the Bay'at al-Ridwan, and it contains the beautiful description of the companions as firm against the disbelievers and merciful among themselves.",

49: "Al-Hujurat contains some of the most practical social ethics in the Quran. It teaches the believers not to raise their voices above the Prophet's, to verify news before acting on it, not to mock others, avoid suspicion, and not to backbite. It closes with the memorable verse: 'O mankind, We have created you from a male and a female and made you into peoples and tribes so that you may know one another. Indeed, the most noble of you before Allah is the most righteous of you.'",

50: "Qaf opens with a powerful oath by the Quran and immediately challenges the disbelievers' denial of resurrection. It describes the angels recording every word spoken by man, the moment of death, and the driving of people to paradise and hell. It closes with a command to the Prophet (ﷺ) to be patient, to glorify Allah morning and evening, and to listen for the Day when the caller will call from a nearby place.",

51: "Adh-Dhariyat, the Winnowing Winds, opens with a series of oaths by the winds, the rain-bearing clouds, the smoothly gliding ships, and the angels distributing commands. It affirms the truth of the Day of Judgement and tells the stories of Ibrahim's guests and the people of Ad, Thamud, Nuh, and Lut. The surah contains the verse: 'And I did not create the jinn and mankind except to worship Me.'",

52: "At-Tur, the Mount, opens with a series of powerful oaths: by the mount of Sinai, the inscribed book, the inhabited house, the raised roof, the swelling sea. These oaths build to a climactic declaration that the punishment of your Lord will certainly come. The surah then describes the delights of paradise in detail and ends with a consolation to the Prophet (ﷺ) to be patient and to wait for the command of his Lord.",

53: "An-Najm, the Star, opens with an oath: 'By the star when it descends, your companion has not strayed, nor has he erred.' It describes the Prophet's (ﷺ) vision of Jibreel in his true form and affirms that revelation is not personal speech but divine guidance. The surah also refutes those who gave names and attributes to idols and who followed only assumption. When the Prophet (ﷺ) recited this surah, all who were present, Muslims and polytheists alike, fell in prostration.",

54: "Al-Qamar, the Moon, opens with the splitting of the moon, a sign the Makkans witnessed yet still denied. It tells the stories of the people of Nuh, Ad, Thamud, Lut, and Pharaoh in rapid succession, each ending with the refrain: 'We have certainly made the Quran easy to remember, so is there anyone who will remember?' The surah confronts those who dismiss the Quran and warns of a punishment that will be more severe and more bitter than anything imagined.",

55: "Ar-Rahman is often called the Beauty of the Quran. It repeats the refrain 'Which of your Lord's favours will you both deny?' 31 times, directed at both jinn and mankind. It lists the blessings of creation with stunning poetry: the rising sun, the two seas, the trees prostrating, the fruits and grains. The two gardens of paradise are described with lush imagery: flowing springs, spreading trees, and fruits of every kind.",

56: "Al-Waqiah, the Inevitable, describes the Event of the Final Hour with urgency and certainty. It divides humanity into three groups: the foremost, who are the closest to Allah; the people of the right; and the people of the left, and describes in vivid detail the different destinies that await them. The Prophet (ﷺ) said: 'Whoever recites Al-Waqiah every night will never be afflicted by poverty.' (Ibn as-Sunni, though the chain is discussed, it is widely transmitted).",

57: "Al-Hadid, the Iron, begins with a declaration of Allah's absolute sovereignty and closes with a reminder that the life of this world is play and amusement, a passing adornment. It was revealed in Madinah and urges the believers to spend in the way of Allah. It contains the description of the Day of Judgement when the hypocrites will ask the believers for light, only to be told there is a wall between them with mercy on one side and punishment on the other.",

58: "Al-Mujadila is named after the woman who came to the Prophet (ﷺ) disputing the pronouncement of her husband who had declared her back like his mother's. Allah heard her argument and revealed clear verses addressing her case with justice. The surah then addresses the hypocrites who secretly ally with the enemies of Allah, and it closes with the famous verse about giving space in gatherings and Allah elevating those who have knowledge.",

59: "Al-Hashr describes the expulsion of the Banu Nadir, a Jewish tribe of Madinah who were exiled after plotting against the Prophet (ﷺ). It addresses the distribution of their wealth and warns against following Shaytan's whispers. The surah closes with some of the most beautiful names and attributes of Allah, leading the scholars to say that whoever recites the last three verses of Al-Hashr in the morning will have 70,000 angels praying for them until evening. (Tirmidhi).",

60: "Al-Mumtahanah, the Woman to be Examined, addresses the believers' relationships with those who oppose the faith. It was revealed in the context of a companion who sent a letter to the Quraysh warning them of an upcoming expedition. The surah forbids allying with those who are hostile to Allah and His messenger, while permitting kindness and justice toward those who do not fight the Muslims over religion.",

61: "As-Saf, the Ranks, opens with a stern warning: 'O you who believe, why do you say what you do not do?' It calls the believers to be like a single solid structure in the way of Allah, and it prophecies the coming of the Prophet (ﷺ) through the words of Isa (AS), who announced him by name as Ahmad. The surah calls to a transaction that saves from painful punishment: belief in Allah and His messenger, and striving in His cause.",

62: "Al-Jumuah, the Friday, commands the believers to hasten to the remembrance of Allah when the call to Friday prayer is made and to leave off all trading. It criticises those among the People of the Book who were entrusted with the Torah but did not live by it, comparing them to a donkey carrying books. The Prophet (ﷺ) regularly recited Al-Jumuah and Al-Munafiqun in the Friday prayer.",

63: "Al-Munafiqun exposes the traits of the hypocrites of Madinah: their smooth speech, their false oaths, their arrogance, and their efforts to turn people away from supporting the Prophet (ﷺ). The surah warns the believers not to let their wealth and children distract them from the remembrance of Allah, and it urgently reminds them to spend before death comes and they cry out for more time.",

64: "At-Taghabun, the Mutual Disillusionment, describes the Day when every person's loss will become apparent to them. It reminds the believers that their spouses and children may be a trial for them and warns against letting love of wealth cause neglect of duty to Allah. It closes with beautiful encouragement: if you loan to Allah a goodly loan, He will multiply it for you and forgive your sins.",

65: "At-Talaq contains detailed guidance on the rulings of divorce, emphasising that even in the most difficult personal circumstances, the commands of Allah must be followed. It repeats the reminder to have taqwa, consciousness of Allah, multiple times, and it contains one of the most comforting promises in the Quran: 'Whoever has taqwa of Allah, He will make a way out for them and provide for them from where they did not expect.'",

66: "At-Tahrim addresses an incident involving the Prophet (ﷺ) and his wives, reminding all believers that no one, regardless of their proximity to the Prophet (ﷺ), is above accountability. It presents two contrasting examples of women: the wives of Nuh and Lut who betrayed their husbands and entered the fire, and Maryam and the wife of Pharaoh who believed and were honoured. Faith is a personal choice that no relationship can substitute.",

67: "Al-Mulk is the protector surah. The Prophet (ﷺ) said: 'There is a surah in the Quran of thirty verses that will intercede for its companion until he is forgiven: Blessed is He in whose hand is the dominion.' (Abu Dawud, Tirmidhi, graded hasan). It opens with the creation of death and life as a test of who is best in deed, and it challenges the disbelievers to look for any flaw in the creation of the Most Merciful.",

68: "Al-Qalam, the Pen, opens with one of the earliest oaths in the Quran: 'By the pen and what they inscribe.' It was revealed to console the Prophet (ﷺ) who was being called a madman, and it affirms that he is on the most exalted character. It tells the parable of the owners of the garden who planned to harvest their fruit without giving the poor their share, only to find it destroyed overnight. The surah connects good character to the highest success.",

69: "Al-Haqqah, the Inevitable Reality, opens with a rhetorical question building a sense of overwhelming certainty about the Day of Judgement. It tells how previous nations, Ad, Thamud, Pharaoh, and the people of Lut, were destroyed by the truth catching up with them. It then describes the record books handed to people's right and left hands, the weighing of deeds, and the certainty of the Quran as the word of a noble messenger.",

70: "Al-Maarij, the Ascending Stairways, describes the Day of Judgement as something distant to the disbelievers but near in Allah's sight. It asks: will a person ransom himself from punishment by sacrificing his children, his wife, his brother, all his kin? But there will be no escape. The surah then describes qualities of the believer: establishing prayer, giving from wealth, believing in the Day of Judgement, and guarding their honour.",

71: "Nuh tells the complete story of the Prophet Nuh (AS) and his 950 years of calling his people. He called them day and night, openly and in secret, yet only a few believed. The surah includes Nuh's supplication against the disbelievers after losing hope in their guidance, and his prayer: 'My Lord, forgive me, my parents, and whoever enters my house as a believer.' It is a surah of perseverance and the limits of human effort.",

72: "Al-Jinn tells the story of a group of jinn who heard the Quran being recited and immediately believed. They returned to their people saying: 'We have heard a wondrous recitation that guides to righteousness, and we have believed in it.' The surah clarifies that jinn and humans share the same accountability before Allah and that some among the jinn are righteous while others are unjust.",

73: "Al-Muzzammil was revealed early in the Prophethood when the Prophet (ﷺ) was commanded to rise at night and recite the Quran in measured, unhurried recitation. It emphasises the night prayer as a source of strength and clarity for the prophetic mission. The surah also permits a degree of flexibility in the length of the night prayer, acknowledging the difficulty of the command while affirming its spiritual importance.",

74: "Al-Muddaththir, the Cloaked One, was among the earliest revelations. The Prophet (ﷺ) was told to rise and warn, to glorify his Lord, to purify his garments, and to avoid all filth. The surah describes a proud and wealthy man who heard the Quran, admitted it was extraordinary, but then publicly dismissed it out of arrogance. It ends with a description of the fire and its guardians, and the fate of those who denied.",

75: "Al-Qiyamah, the Resurrection, opens by swearing by the Day of Resurrection and by the self-reproaching soul, the soul that holds itself to account. It asserts that Allah will gather every bone, even the fingertips, and that man will have no excuse, for his own self will be a witness against him. The surah also beautifully describes the moment of death and the separation of the soul from the body.",

76: "Al-Insan, also known as Ad-Dahr or Al-Hali Ata, was revealed in Madinah and opens with a reminder of man's humble origins. It contains a moving description of the righteous who fulfil their vows, feed the poor, the orphan, and the captive for the sake of Allah alone, saying: 'We feed you only for the sake of Allah; we desire from you neither reward nor gratitude.' Their reward is described in extraordinary detail: silk garments, flowing springs, and the sight of Allah's favour.",

77: "Al-Mursalat, the Sent Ones, opens with a powerful series of oaths by the winds sent in succession. It repeats the refrain 'Woe that Day to the deniers' ten times, each time after presenting a different sign or argument. The surah builds an atmosphere of warning and urgency, addressing those who denied the resurrection and mocked the truth, and it closes with a challenge: in what statement after this will they believe?",

78: "An-Naba, the Great News, opens with a conversation among the disbelievers about 'the great news,' the resurrection. It then presents evidence in creation: the earth as a resting place, the mountains as stakes, sleep as rest, the night as a garment, the day for livelihood, and the seven firm heavens. It then describes the Day of Judgement, the torment of the ungrateful, and the gardens of paradise for the righteous.",

79: "An-Naziat opens with five oaths by different categories of angels: those who pull out souls forcefully, those who draw them out gently, those who glide swiftly, those who race ahead, and those who carry out commands. It tells the story of Musa and Pharaoh, and it describes the overwhelming event of the Last Hour. It closes with a reflection on the journey of man from creation to death to resurrection.",

80: "Abasa, He Frowned, begins with a gentle but firm correction of the Prophet (ﷺ) who turned away from a blind man, Abdullah ibn Umm Maktum, while engaged with some Quraysh leaders. The surah reminds him that the one who comes with eagerness to learn deserves full attention. It then moves to the resurrection, when every person will flee from their own mother, father, spouse, and children.",

81: "At-Takwir, the Folding Up, describes the cosmic events of the Last Hour in rapid, dramatic succession: the sun folded up, the stars darkened, the mountains moved, the seas set ablaze, and the souls reunited with their bodies. Each image builds upon the last, creating an overwhelming sense of the magnitude of the Day. The surah then affirms the truth of revelation and the noble character of the angel who delivered it.",

82: "Al-Infitar, the Cleaving Asunder, describes the heavens splitting open, the stars scattering, the seas erupting, and the graves overturned. It asks: what has deceived you about your Lord? It reminds man that two noble recording angels are with him at all times, writing down everything he does. No soul will be able to do a thing for another, and command on that Day belongs entirely to Allah.",

83: "Al-Mutaffifin, Those Who Defraud, was revealed at a time when dishonest trade was common in Madinah. It condemns those who demand full measure when receiving but give less than due when they give to others. It describes the record of the wicked, the Sijjin, and the record of the righteous, the Illiyyun. The surah ends with the mockers of this world becoming the ones mocked in the next.",

84: "Al-Inshiqaq, the Splitting Open, describes the sky splitting apart in obedience to its Lord. The believer who receives his record in his right hand will say with joy: 'Here, read my record!' while the one who receives it behind his back will call for death. The surah reflects on the journey of the human soul through its stages, and asks what prevents people from believing when the Quran is recited to them.",

85: "Al-Buruj, the Constellations, tells the story of the People of the Trench, believers who were burned alive for their faith by an unjust king. It affirms that Allah witnesses all oppression and that those who persecute believers without repenting will face the punishment of the Hellfire. The surah reminds the Prophet (ﷺ) of previous scriptures and affirms that the Quran is preserved on a Preserved Tablet.",

86: "At-Tariq, the Night Star, opens with an oath by the sky and the piercing star. It then draws attention to how man was created from a fluid, and affirms that Allah is watching over every soul. The surah asserts that the Quran is a decisive word, not something light or frivolous, and that those who plot against it will find their plots useless.",

87: "Al-Ala, the Most High, opens with the command to glorify the name of your Lord, the Most High. It affirms that Allah created and proportioned, destined and guided, and causes vegetation to grow and then wither. The Prophet (ﷺ) loved this surah and recited it regularly in Jumuah and Eid prayers. The surah reminds us that success belongs to those who purify themselves and remember the name of their Lord.",

88: "Al-Ghashiyah, the Overwhelming Event, describes the Day of Judgement as an overwhelming, covering event. Faces will be humiliated, exhausted, scorched, while other faces will be bright with contentment in a high garden. The surah then turns to the signs of creation: the camel, the sky, the mountains, and the earth, and commands the Prophet (ﷺ) to remind, for he is only a reminder. He is not a controller over them.",

89: "Al-Fajr opens with an oath by the dawn, the ten nights, the even and the odd, and the departing night. It tells the stories of Ad, Thamud, and Pharaoh, destroyed for their transgression. It then addresses the human tendency to be arrogant in times of wealth and despairing in times of hardship. The surah closes with one of the most beautiful descriptions in the Quran of the soul at peace being invited: 'O tranquil soul, return to your Lord, well-pleased and pleasing to Him.'",

90: "Al-Balad, the City, opens with an oath by the city of Makkah, in which the Prophet (ﷺ) walks as a free man, and by the father and what he begat. It reflects on the difficulty of man's journey through life and criticises those who boast of spending wealth while squandering it on vanity. The surah then defines the steep path: freeing a slave, feeding an orphan or a person in need, and being among those who believe and enjoin patience and mercy.",

91: "Ash-Shams, the Sun, opens with eleven consecutive oaths by the sun, the moon, the day, the night, the sky, the earth, and the soul. These oaths build to a single conclusion: the one who purifies his soul succeeds, and the one who corrupts it fails. The surah tells the story of Thamud, who were destroyed because they hamstrung the she-camel of Allah when they were commanded not to.",

92: "Al-Layl, the Night, opens with oaths by the night, the day, and the creation of male and female. It then presents two contrasting paths: the one who gives, has taqwa, and affirms the best, will be eased to ease; and the one who withholds, is self-sufficient, and denies the best, will be eased to hardship. It affirms that guidance belongs to Allah and that the fire will be inherited by the most wretched.",

93: "Ad-Duha was revealed to console the Prophet (ﷺ) during a period when revelation had paused and some were mocking him, saying his Lord had abandoned him. The surah opens with an oath by the morning light and the still night, declaring: 'Your Lord has not abandoned you, nor has He become displeased.' It reminds the Prophet (ﷺ) of the care Allah took of him as an orphan, a wanderer, and one in need, and commands him to proclaim the blessings of his Lord.",

94: "Ash-Sharh, also known as Al-Inshirah, continues the tone of comfort from Ad-Duha. It addresses the Prophet (ﷺ) with tenderness: 'Did We not expand your chest for you, and remove from you your burden?' It contains one of the most powerful promises of relief in the Quran, repeated twice: 'With hardship comes ease.' The scholars note the indefinite 'hardship' is mentioned once, while 'ease' in the original Arabic carries the definite article, suggesting the same ease that comes is constant.",

95: "At-Tin, the Fig, opens with oaths by the fig, the olive, the Mount Sinai, and this city of security. It declares that man was created in the best of forms, then reduced to the lowest of the low except for those who believe and do righteous deeds. The surah closes with a challenge: who could dispute the judgement of Allah, the wisest of all judges?",

96: "Al-Alaq contains the very first verses revealed to the Prophet (ﷺ), beginning with the command: 'Read in the name of your Lord who created.' It celebrates the miracle of the pen and the divine gift of teaching man what he did not know. The surah then shifts to condemn a man, identified as Abu Jahl, who tried to stop the Prophet (ﷺ) from praying. It ends with the command to prostrate and draw near to Allah.",

97: "Al-Qadr tells of the Night of Decree, the most blessed night of the year. The Prophet (ﷺ) said it is in the last ten nights of Ramadan, and it is better than a thousand months of worship. On this night the angels and the Spirit descend by the permission of their Lord with every decreed matter. It is a night of peace until the break of dawn. This short surah captures an entire era of divine grace in five verses.",

98: "Al-Bayyinah, the Clear Evidence, addresses the People of the Book and the polytheists who claimed they would follow the truth if it came to them in a clear messenger with clear scriptures. When the Quran came, many still rejected it. The surah defines the essence of true religion: worship Allah sincerely, establish prayer, give zakat, and that is the upright religion. It closes with the contrasting fates of the best and worst of creation.",

99: "Az-Zalzalah, the Earthquake, describes the earth convulsing at the Last Hour, throwing out its burdens, and bearing witness to all that was done upon it. The surah then states the most precise principle of divine justice: 'Whoever does an atom's weight of good will see it, and whoever does an atom's weight of evil will see it.' It is a reminder that nothing, however small, escapes the record.",

100: "Al-Adiyat, the Charging Steeds, opens with a powerful oath by war horses charging at dawn, their hooves striking sparks, their charge raising dust. This vivid scene leads to a declaration of man's ingratitude to his Lord. The surah reminds man that Allah is fully aware of what is in the hearts, and that the graves will be overturned and their secrets exposed on the Day of Judgement.",

101: "Al-Qariah, the Striking Calamity, asks three times what the Striking Calamity is, building a sense of awe before describing it: the Day when people will be like scattered moths and mountains like fluffed wool. Deeds will be weighed, and whoever's scale is heavy will have a pleasant life, while whoever's scale is light will have the abyss as their home.",

102: "At-Takathur, the Rivalry for More, is a short but devastating critique of the human obsession with accumulation: of wealth, children, status, and prestige. The surah says this rivalry distracted people until they visited the graves, implying death itself was the only thing that stopped them. It warns that they will soon come to know, then reiterates that they will certainly know, and promises a reckoning on a Day when they will be questioned about every blessing.",

103: "Al-Asr is one of the shortest surahs in the Quran yet contains one of the most comprehensive statements. Imam Shafii said: 'If Allah had revealed only this surah, it would have been sufficient as a proof for people.' By time, all of mankind is at loss except four: those who believe, do righteous deeds, counsel each other toward truth, and counsel each other toward patience.",

104: "Al-Humazah condemns the slanderer and backbiter who mocks others and accumulates wealth thinking it will make him immortal. The surah describes his fate in the Crusher, a raging fire that leaps over the hearts, closing over them in columns. It is a warning to those who use their tongue and wealth as weapons against others.",

105: "Al-Fil tells the story of the Year of the Elephant, approximately 570 CE, the year the Prophet (ﷺ) was born. Abraha of Yemen marched on Makkah with an army of elephants intending to destroy the Kaaba. Allah sent birds carrying stones of baked clay, destroying the army and leaving them like eaten stalks of wheat. The surah is a reminder of divine protection over the Sacred House.",

106: "Quraysh is often paired with Al-Fil as a continuation. It reminds the Quraysh of Allah's favours: their safe caravans in winter and summer, and the security of Makkah that allowed them to trade and prosper. For these blessings, they are commanded to worship only the Lord of this House, who fed them from hunger and gave them security from fear.",

107: "Al-Maun, the Small Kindnesses, defines the person who denies the faith through their treatment of the vulnerable. The one who repels the orphan harshly and does not encourage feeding the poor is called a denier of the faith, even if he prays. The surah warns those whose prayer is only for show and who withhold even small acts of assistance from those in need.",

108: "Al-Kawthar is the shortest surah in the Quran, three verses, yet it carries a gift beyond measure. Al-Kawthar is a river in paradise given to the Prophet (ﷺ). Anas (RA) reported that the Prophet (ﷺ) said: 'Al-Kawthar is a river that my Lord has promised me, in which there is abundant goodness.' (Muslim). The surah also assures the Prophet (ﷺ) that it is his enemy, not him, who will be cut off.",

109: "Al-Kafirun is a declaration of complete separation between faith and disbelief. The Quraysh had offered the Prophet (ﷺ) a compromise: to worship their gods one year and they would worship his the next. This surah was the response. It affirms that there is no overlap, no compromise, no middle ground: 'For you is your religion, and for me is my religion.' The Prophet (ﷺ) used to recite it in the two sunnah rakaat of Fajr.",

110: "An-Nasr, the Help, was one of the last surahs revealed to the Prophet (ﷺ). When he recited it, Umar (RA) and the senior companions wept, understanding that it announced the approaching end of the prophetic mission. It commands: when the help of Allah comes and the conquest happens and you see people entering the religion of Allah in multitudes, then glorify your Lord's praises and seek His forgiveness.",

111: "Al-Masad, the Fibre, is the only surah in the Quran to name a specific person by their kunyah and condemn them by name: Abu Lahab, the uncle of the Prophet (ﷺ), and his wife who used to spread thorns in the Prophet's path. It was revealed as a direct response to Abu Lahab's public rejection and mocking of the Prophet (ﷺ) when he was called to convey his message.",

112: "Al-Ikhlas is equivalent to a third of the Quran in reward. The Prophet (ﷺ) said: 'By the One in whose hand is my soul, it is equivalent to a third of the Quran.' (Bukhari). It was revealed in response to those who asked the Prophet (ﷺ) to describe his Lord. It states in four verses the complete doctrine of tawhid: Allah is One, the Self-Sufficient, He neither begets nor was begotten, and there is none like Him.",

113: "Al-Falaq seeks refuge in the Lord of the daybreak from three sources of harm: the evil of what He has created, the darkness of the night when it settles, and those who blow on knots in witchcraft, and from the envy of the envier. The Prophet (ﷺ) said he was never given anything better than the two Muwwidhatain, Al-Falaq and An-Nas, and he used to recite them every night before sleeping. (Abu Dawud, Nasai).",

114: "An-Nas, Mankind, is the final surah of the Quran, seeking refuge in the Lord, King, and God of mankind from the whisperer who withdraws, who whispers into the hearts of both jinn and men. The Prophet (ﷺ) recited Al-Falaq and An-Nas every night and wiped his body with his hands after reciting them. (Bukhari). Together they are the ultimate protection, sought from the One who has full authority over all of creation."
};

// ═══ SM-2 ═══
const BOOST={good:4,ok:3,bad:2,notsure:1};
// ═══ SM-2 CONFIG ═══
// Each mode has: efStart, efMin, efBoost, forgetMult, firstGoodInterval
const SM2_PRESETS = {
  lenient:  {efStart:2.2, efMin:1.1, efBoost:0.05, forgetMult:0.5,  firstGood:4},
  standard: {efStart:2.5, efMin:1.3, efBoost:0.10, forgetMult:0.3,  firstGood:6},
  strict:   {efStart:2.7, efMin:1.5, efBoost:0.15, forgetMult:0.15, firstGood:8},
};
// Custom maps slider values (low/medium/high) to actual parameter values
const SLIDER_VALS = {
  growth:    {low:{efStart:2.2,efBoost:0.05}, medium:{efStart:2.5,efBoost:0.10}, high:{efStart:2.7,efBoost:0.15}},
  forgiving: {low:{forgetMult:0.5},           medium:{forgetMult:0.3},           high:{forgetMult:0.15}},
  floor:     {low:{efMin:1.1},                medium:{efMin:1.3},                high:{efMin:1.5}},
};

function getSM2Cfg(){
  const mode=S.srMode||'standard';
  if(mode==='custom'){
    const g=SLIDER_VALS.growth[S.srCustom?.growth||'medium'];
    const f=SLIDER_VALS.forgiving[S.srCustom?.forgiving||'medium'];
    const fl=SLIDER_VALS.floor[S.srCustom?.floor||'medium'];
    return{efStart:g.efStart,efMin:fl.efMin,efBoost:g.efBoost,forgetMult:f.forgetMult,firstGood:6};
  }
  return SM2_PRESETS[mode]||SM2_PRESETS.standard;
}

function sm2Init(statusKey){
  const b=BOOST[statusKey]||1;
  const cfg=getSM2Cfg();
  let interval=1,reps=0;
  // EF reflects initial confidence — Bad is penalised, Not sure is neutral like OK
  const efByStatus={good:2.7, ok:cfg.efStart, bad:1.6, notsure:cfg.efStart};
  let ef=efByStatus[statusKey]||cfg.efStart;
  if(b>=4){interval=4;reps=2}else if(b===3){interval=1;reps=1}
  const dueNow=(b<=2);
  const d=new Date();if(!dueNow)d.setDate(d.getDate()+interval);
  return{ef,interval:dueNow?0:interval,reps,nextReview:d.toISOString().split('T')[0],lastReview:null,lastQuality:5};
}
function sm2Update(card,quality){
  const cfg=getSM2Cfg();
  let{ef,interval,reps,status}=card;
  if(quality>=3){
    if(reps===0){
      if(status==='bad'){
        interval=Math.min(2,Math.round(1+(quality/5)));
      } else {
        interval=Math.round(1+(quality-1));
      }
    } else if(reps===1){
      interval=status==='bad'?Math.min(cfg.firstGood-2,Math.round(interval*ef)):cfg.firstGood;
    } else {
      interval=Math.round(interval*ef);
    }
    reps+=1;
    // EF update using config boost
    const rawBoost=cfg.efBoost-(5-quality)*(0.08+(5-quality)*0.02);
    ef=Math.max(cfg.efMin,ef+rawBoost);
  } else {
    interval=Math.max(1,Math.round(interval*cfg.forgetMult));
    reps=Math.max(0,reps-1);
    ef=Math.max(cfg.efMin,ef-0.2);
  }
  const d=new Date();d.setDate(d.getDate()+interval);
  return{...card,ef,interval,reps,nextReview:d.toISOString().split('T')[0],lastReview:today(),lastQuality:quality};
}

// ═══ CARDS ═══
function cardId(n,pi){return pi!==undefined?`${n}_p${pi}`:`${n}`}
function cardLabel(n,pi){
  const s=SD.find(x=>x.n===n);if(!s)return'';
  if(pi===undefined||!S.parts[n])return s.name;
  const p=S.parts[n][pi];
  return p?`${s.name} · ${p.label||`${p.from}–${p.to}`}`:s.name;
}
function cardAyahs(n,pi){
  const s=SD.find(x=>x.n===n);if(!s)return 0;
  if(pi===undefined||!S.parts[n])return s.a;
  const p=S.parts[n][pi];return p?(p.to-p.from+1):s.a;
}
function addCard(n,pi,statusKey){
  const id=cardId(n,pi);
  S.cards[id]={id,surahN:n,partIdx:pi,...sm2Init(statusKey),status:statusKey};
}
function getDueCards(){const t=today();return Object.values(S.cards).filter(c=>c.nextReview<=t)}
function getTodayQueue(){
  // Legacy stub — session system now handles queue management
  if(!S.session||S.session.date!==today()) buildSession();
  return S.session.queue.map(id=>S.cards[id]).filter(Boolean);
}
function daysUntil(d){return Math.round((new Date(d)-new Date(today()))/86400000)}
function totalAyahsInPool(){return Object.values(S.cards).reduce((a,c)=>a+cardAyahs(c.surahN,c.partIdx),0)}

// ═══ STREAKS ═══
function updateStreak(targetMet){
  const t=today(),str=S.streak;
  const diff=str.lastReview?Math.round((new Date(t)-new Date(str.lastReview))/86400000):999;
  if(str.lastReview!==t){if(diff===1)str.review+=1;else if(diff>1)str.review=1;str.lastReview=t;}
  if(targetMet&&str.lastTarget!==t){
    const dt=str.lastTarget?Math.round((new Date(t)-new Date(str.lastTarget))/86400000):999;
    if(dt===1)str.target+=1;else str.target=1;str.lastTarget=t;
  }
  str.history=str.history||[];
  if(!str.history.includes(t))str.history.push(t);
  if(str.history.length>365)str.history.shift();
  // Track days the target was hit, for the calendar
  str.targetHistory=str.targetHistory||[];
  if(targetMet&&!str.targetHistory.includes(t))str.targetHistory.push(t);
  if(str.targetHistory.length>365)str.targetHistory.shift();
}

// ═══ ACHIEVEMENTS ═══

// Helper: check if a surah is fully covered (whole card OR parts summing to all ayahs)
function surahFullyCovered(s, cards, parts){
  // Whole-surah card (no parts)
  if(cards.some(c=>c.surahN===s.n&&c.partIdx===undefined&&!parts[s.n]?.length)) return true;
  // Parts covering entire surah
  if(parts[s.n]?.length){
    const covered=parts[s.n].reduce((sum,p)=>sum+(p.to-p.from+1),0);
    if(covered>=s.a) return true;
  }
  return false;
}

// Helper: count how many juz are 100% covered by ayah
function juzComplete(s, needed){
  const cards=Object.values(s.cards);
  let count=0;
  for(let j=1;j<=30;j++){
    const total=getJuzTotalAyahs(j);
    if(!total)continue;
    // Replicate getJuzMemoisedAyahs but with current s context
    let done=0;
    for(const [sn,jFrom,jTo] of (JUZ_BOUNDARIES[j]||[])){
      const surah=SD.find(x=>x.n===sn);
      if(!surah)continue;
      const surahCards=cards.filter(c=>c.surahN===sn);
      if(!surahCards.length)continue;
      if(!s.parts[sn]||!s.parts[sn].length){
        done+=(jTo-jFrom+1);
      } else {
        s.parts[sn].forEach(p=>{
          const oF=Math.max(p.from,jFrom),oT=Math.min(p.to,jTo);
          if(oT>=oF)done+=(oT-oF+1);
        });
      }
    }
    if(done>=total)count++;
    if(count>=needed)return true;
  }
  return false;
}

// Helper: check if specific ayah range (surahN, fromAyah, toAyah) is fully covered
// Covers: exact whole-surah card, range card covering those ayahs, range included in a larger range,
// or split across multiple ranges that together cover it
function rangeCovered(surahN, fromAyah, toAyah, cards, parts){
  const surahCards=cards.filter(c=>c.surahN===surahN);
  if(!surahCards.length) return false;
  // Whole surah card covers any range within it
  if(surahCards.some(c=>c.partIdx===undefined&&!parts[surahN]?.length)) return true;
  // Check parts — build list of all covered ayah ranges for this surah
  const ranges=(parts[surahN]||[]).map(p=>({from:p.from,to:p.to}));
  // Check if every ayah from fromAyah to toAyah is covered by at least one range
  for(let ayah=fromAyah; ayah<=toAyah; ayah++){
    if(!ranges.some(r=>ayah>=r.from&&ayah<=r.to)) return false;
  }
  return true;
}

// Helper: count distinct surahs in pool (whole cards or any part)
function surahsInPool(cards){
  return new Set(cards.map(c=>c.surahN)).size;
}

// Queue of achievements waiting to be shown
let _pendingAchs = [];
let _achQueueActive = false;

function checkAchs(){
  // Collect ALL newly unlocked achievements BEFORE showing any
  ACHS.forEach(def=>{
    if(!S.achievements[def.id] && def.check(S)){
      S.achievements[def.id] = today();
      _pendingAchs.push(def);
    }
  });
  save();
  // Only auto-trigger if in main app and nothing already showing
  if(!_achQueueActive && _pendingAchs.length>0 && S.onboarded){
    showNextAchievement();
  }
}

function fireConfetti(){
  try{
    const cel=document.getElementById('celebrate');
    if(!cel)return;
    cel.innerHTML='';cel.classList.remove('hidden');
    ['#4dc97a','#f0b040','#e09520','#80dda0','#f7cc7a','#b3ece8'].forEach(c=>{
      for(let i=0;i<10;i++){
        const p=document.createElement('div');
        p.className='confetti-piece';
        p.style.cssText='left:'+(Math.random()*100)+'%;top:-10px;background:'+c+';animation-delay:'+(Math.random()*0.8)+'s;animation-duration:'+(1.6+Math.random()*0.6)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px';
        cel.appendChild(p);
      }
    });
    setTimeout(function(){cel.classList.add('hidden');},2500);
  }catch(e){}
}

function showNextAchievement(){
  if(_pendingAchs.length===0){_achQueueActive=false;return;}
  _achQueueActive=true;
  const ach=_pendingAchs[0];
  const afterThis=_pendingAchs.length-1;
  const enc=ACH_ENCOURAGEMENT[ach.id]||'Keep going — your effort is noticed and rewarded.';
  fireConfetti();
  let buttons;
  if(afterThis===0){
    buttons='<button class="btn btn-primary btn-full" onclick="closeAchModal()">Alhamdulillah ✓</button>';
  } else {
    buttons='<div style="display:flex;gap:8px">'
      +'<button class="btn btn-secondary btn-sm" onclick="closeAllAchModals()">Close all</button>'
      +'<button class="btn btn-primary btn-full" onclick="advanceAchModal()">Alhamdulillah ('+afterThis+' more) →</button>'
      +'</div>';
  }
  const html='<div style="text-align:center;padding:8px 0 4px">'
    +'<div style="font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--gold-400);text-transform:uppercase;margin-bottom:14px">Achievement unlocked</div>'
    +'<div style="display:inline-flex;align-items:center;justify-content:center;width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,rgba(224,149,32,0.15),rgba(224,149,32,0.05));border:2px solid var(--gold-500);margin-bottom:14px;font-size:2.5rem;box-shadow:0 0 32px rgba(240,176,64,0.25)">'+ach.icon+'</div>'
    +'<h2 style="color:var(--gold-300);margin-bottom:6px;font-size:1.6rem">'+ach.name+'</h2>'
    +'<p style="color:var(--teal-200);font-size:0.9rem;margin-bottom:18px;line-height:1.5">'+ach.desc+'</p>'
    +'<div style="background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px 16px;margin-bottom:20px">'
    +'<p style="color:var(--gold-200);font-style:italic;font-size:0.85rem;line-height:1.6">'+enc+'</p>'
    +'</div>'
    +buttons
    +'</div>';
  const contentEl=document.getElementById('ach-modal-content');
  const modalEl=document.getElementById('ach-modal');
  if(!contentEl||!modalEl){
    // DOM not ready — retry after a short delay
    setTimeout(showNextAchievement,300);
    _achQueueActive=false;
    return;
  }
  contentEl.innerHTML=html;
  modalEl.classList.remove('hidden');
}

function advanceAchModal(){
  // Shift current and show next
  _pendingAchs.shift();
  document.getElementById('ach-modal').classList.add('hidden');
  setTimeout(showNextAchievement,200);
}

function closeAchModal(){
  _pendingAchs.shift();
  _achQueueActive=false;
  document.getElementById('ach-modal').classList.add('hidden');
}

function closeAllAchModals(){
  _pendingAchs=[];
  _achQueueActive=false;
  document.getElementById('ach-modal').classList.add('hidden');
}

// Backwards-compat stub
function celebrate(ach){
  if(!_pendingAchs.some(a=>a.id===ach.id)) _pendingAchs.push(ach);
  if(!_achQueueActive && S.onboarded) showNextAchievement();
}
