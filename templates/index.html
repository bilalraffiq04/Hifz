<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hifz — Quran Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --teal-950:#0a1f1e;--teal-900:#0d2b29;--teal-800:#103d3a;--teal-700:#155550;
  --teal-600:#1a6e67;--teal-500:#208a81;--teal-400:#2aada2;--teal-300:#4dc9bc;
  --teal-200:#80ddd6;
  --gold-700:#8a5200;--gold-500:#c97d0a;--gold-400:#e09520;--gold-300:#f0b040;
  --gold-200:#f7cc7a;
  --green-600:#1a6e3a;--green-500:#22874a;--green-400:#2da85e;--green-300:#4dc97a;
  --green-200:#80dda0;
  --navy-700:#1a2a4a;--navy-600:#1e3460;--navy-500:#254080;--navy-400:#3355a0;--navy-300:#6688cc;
  --cream:#f5f0e8;--err:#e05a5a;--err-bg:#2d1010;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--teal-950);color:var(--cream);min-height:100vh;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
h1,h2{font-family:'Playfair Display',serif}
h1{font-size:2.2rem;font-weight:700;line-height:1.2}
h2{font-size:1.4rem;font-weight:600}
h3{font-size:1.05rem;font-weight:600}
.label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal-300);margin-bottom:6px}
.muted{color:var(--teal-300);font-size:0.875rem}
.arabic{font-size:1.3rem;direction:rtl;font-weight:400;color:var(--teal-200);line-height:1.6}
.card{background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r-lg);padding:20px}
button{font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;border:none;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--r);font-size:0.9rem;font-weight:500}
.btn-primary{background:var(--gold-400);color:var(--teal-950);font-weight:600}
.btn-primary:hover{background:var(--gold-300);transform:translateY(-1px)}
.btn-secondary{background:var(--teal-800);color:var(--cream);border:1px solid var(--teal-600)}
.btn-secondary:hover{background:var(--teal-700);border-color:var(--teal-400)}
.btn-ghost{background:transparent;color:var(--teal-300);padding:8px 12px;border-radius:var(--r-sm)}
.btn-ghost:hover{background:var(--teal-800);color:var(--cream)}
.btn-danger{background:var(--err-bg);color:var(--err);border:1px solid rgba(224,90,90,0.3)}
.btn-danger:hover{background:rgba(224,90,90,0.2)}
.btn-sm{padding:8px 16px;font-size:0.8rem}
.btn-full{width:100%}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
input,textarea,select{
  font-family:'Inter',sans-serif;background:var(--teal-800);border:1px solid var(--teal-600);
  border-radius:var(--r-sm);color:var(--cream);font-size:0.9rem;padding:10px 14px;
  width:100%;transition:border-color 0.15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold-400)}
input::placeholder,textarea::placeholder{color:var(--teal-400)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
select option{background:var(--teal-800)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-gold{background:rgba(224,149,32,0.15);color:var(--gold-300);border:1px solid rgba(224,149,32,0.3)}
.badge-teal{background:rgba(42,173,162,0.15);color:var(--teal-300);border:1px solid rgba(42,173,162,0.3)}
.bottom-nav{display:flex;background:var(--teal-900);border-top:1px solid var(--teal-700);position:sticky;bottom:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 14px;background:transparent;color:var(--teal-400);font-size:10px;font-weight:500;letter-spacing:0.04em;transition:color 0.15s;border-top:2px solid transparent}
.nav-item.active{color:var(--gold-300);border-top-color:var(--gold-400)}
.nav-item svg{width:20px;height:20px}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--teal-900);border-bottom:1px solid var(--teal-800);position:sticky;top:0;z-index:50}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold-300)}
.streak-pill{flex:1;background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r);padding:12px 14px}
.streak-num{font-size:1.5rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold-300)}
.streak-label{font-size:10px;color:var(--teal-400);margin-top:2px}
.surah-due-card{background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.18s}
.surah-due-card:hover{border-color:var(--gold-500);background:var(--teal-700)}
.surah-due-card.urgent{border-color:rgba(224,90,90,0.4)}
.surah-num-badge{width:36px;height:36px;border-radius:50%;background:var(--teal-700);border:1px solid var(--teal-600);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--teal-200);flex-shrink:0}
.urgency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-overdue{background:var(--err)}.dot-today{background:var(--gold-400)}.dot-soon{background:var(--teal-400)}
.quality-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.quality-btn{background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px 6px;text-align:center;color:var(--cream);font-size:0.85rem;font-weight:500;transition:all 0.18s;cursor:pointer}
.quality-btn:hover{transform:translateY(-2px)}
.q-1{border-color:rgba(224,90,90,0.6)}.q-1:hover,.q-1.sel{background:rgba(224,90,90,0.18);border-color:var(--err)}
.q-2{border-color:rgba(224,90,90,0.35)}.q-2:hover,.q-2.sel{background:rgba(224,90,90,0.1);border-color:var(--err)}
.q-3{border-color:rgba(240,176,64,0.4)}.q-3:hover,.q-3.sel{background:rgba(240,176,64,0.1);border-color:var(--gold-300)}
.q-4{border-color:rgba(45,168,94,0.35)}.q-4:hover,.q-4.sel{background:rgba(45,168,94,0.12);border-color:var(--green-300)}
.q-5{border-color:rgba(45,168,94,0.55)}.q-5:hover,.q-5.sel{background:rgba(45,168,94,0.18);border-color:var(--green-300)}

/* ── STATUS COLOURS ── */
/* good = green, ok = gold/yellow, bad = red, notsure = dark navy-blue */
.s-good{background:rgba(45,168,94,0.18);border-color:var(--green-400)!important;color:var(--green-200)!important}
.s-ok{background:rgba(240,176,64,0.15);border-color:var(--gold-400)!important;color:var(--gold-200)!important}
.s-bad{background:rgba(224,90,90,0.15);border-color:var(--err)!important;color:#f09090!important}
.s-notsure{background:rgba(51,85,160,0.25);border-color:var(--navy-400)!important;color:var(--navy-300)!important}

/* status pill buttons */
.spill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--teal-700);background:transparent;color:var(--teal-400);transition:all 0.15s;white-space:nowrap}
.spill:hover{color:var(--cream)}
.spill.sp-good{background:rgba(45,168,94,0.18);border-color:var(--green-400);color:var(--green-200)}
.spill.sp-ok{background:rgba(240,176,64,0.15);border-color:var(--gold-400);color:var(--gold-200)}
.spill.sp-bad{background:rgba(224,90,90,0.15);border-color:var(--err);color:#f09090}
.spill.sp-notsure{background:rgba(51,85,160,0.25);border-color:var(--navy-400);color:var(--navy-300)}

.surah-list-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--teal-900);border:1px solid var(--teal-800);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.surah-list-item:hover{border-color:var(--teal-600);background:var(--teal-800)}
.status-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.bar-none{background:var(--teal-700)}.bar-good{background:var(--green-400)}.bar-ok{background:var(--gold-400)}.bar-bad{background:var(--err)}.bar-due{background:var(--gold-300)}
.achievement{display:flex;align-items:center;gap:12px;padding:14px;background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r);margin-bottom:8px}
.ach-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ach-locked{opacity:0.3;filter:grayscale(1)}
.ach-unlocked .ach-icon{border:1px solid var(--gold-500);background:rgba(224,149,32,0.1)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--teal-900);border:1px solid var(--teal-700);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:24px 20px 36px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--teal-600);margin:0 auto 20px}
.prog-bar-wrap{background:var(--teal-800);border-radius:4px;height:6px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:4px;background:var(--gold-400);transition:width 0.5s}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-top:16px}
.celebrate{position:fixed;inset:0;pointer-events:none;z-index:999}
.celebrate.hidden{display:none}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall 2s forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--teal-700);border-radius:2px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--teal-800);gap:12px}
.ai-result{background:var(--teal-800);border:1px solid var(--gold-700);border-radius:var(--r);padding:16px;margin-top:12px}
.ai-score-display{font-size:2.5rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold-300)}
.tab-row{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--teal-700);border-radius:var(--r-sm);overflow:hidden}
.tab{flex:1;padding:10px;text-align:center;background:transparent;color:var(--teal-400);font-size:0.85rem;font-weight:500;transition:all 0.15s}
.tab.active{background:var(--teal-700);color:var(--cream)}
.split-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(240,176,64,0.12);color:var(--gold-300);border:1px solid rgba(240,176,64,0.25)}
.next-tag{font-size:11px;color:var(--teal-400);margin-top:2px}
.next-tag.overdue{color:var(--err)}.next-tag.today{color:var(--gold-300)}
.page-scroll{flex:1;overflow-y:auto;padding:0 20px 20px}

/* ── CHECKBOX ── */
.cb{
  width:20px;height:20px;border-radius:5px;border:2px solid var(--teal-600);
  background:transparent;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.cb.checked{background:var(--gold-400);border-color:var(--gold-400)}
.cb.checked::after{content:'✓';font-size:12px;font-weight:700;color:var(--teal-950)}
.cb.partial{background:transparent;border-color:var(--gold-500)}
.cb.partial::after{content:'–';font-size:14px;font-weight:700;color:var(--gold-400)}

/* ── JUZ ACCORDION ── */
.juz-row{
  background:var(--teal-900);border:1px solid var(--teal-800);
  border-radius:var(--r);margin-bottom:6px;overflow:hidden;
}
.juz-header{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;user-select:none;
}
.juz-header:hover{background:rgba(255,255,255,0.03)}
.juz-title{flex:1;font-weight:600;font-size:0.92rem}
.juz-meta{font-size:11px;color:var(--teal-400)}
.juz-arrow{color:var(--teal-500);font-size:14px;transition:transform 0.2s;flex-shrink:0}
.juz-arrow.open{transform:rotate(90deg)}
.juz-surahs{display:none;border-top:1px solid var(--teal-800)}
.juz-surahs.open{display:block}
.surah-row-ob{
  display:flex;align-items:center;gap:10px;padding:10px 14px 10px 38px;
  border-bottom:1px solid var(--teal-800);
}
.surah-row-ob:last-child{border-bottom:none}
.surah-row-ob:hover{background:rgba(255,255,255,0.02)}
.surah-row-ob-info{flex:1;min-width:0}
.surah-row-ob-name{font-size:0.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.surah-row-ob-meta{font-size:10px;color:var(--teal-500);margin-top:1px}
.status-pills{display:flex;gap:4px;flex-wrap:wrap}

/* parts section inside surah row */
.parts-section{padding:8px 14px 10px 38px;background:rgba(0,0,0,0.15);border-top:1px solid var(--teal-800)}
.part-row-ob{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.part-row-ob:last-child{margin-bottom:0}
.part-inputs{display:flex;gap:6px;flex:1;align-items:center}
.part-inputs input{padding:6px 10px;font-size:12px}
.part-num-label{font-size:11px;color:var(--teal-400);min-width:50px}

/* ── INTRO ── */
#screen-intro{position:fixed;inset:0;z-index:9999;background:var(--teal-950);display:flex;flex-direction:column;align-items:center;justify-content:center}
#screen-intro.done{display:none}
.intro-glow{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(224,149,32,0.12) 0%,transparent 70%);animation:glowPulse 3s ease infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
.intro-logo{font-family:'Playfair Display',serif;font-size:4.5rem;font-weight:700;color:transparent;background:linear-gradient(135deg,var(--gold-300),var(--gold-500),var(--gold-200));-webkit-background-clip:text;background-clip:text;opacity:0;animation:introLogo 1.8s cubic-bezier(.16,1,.3,1) 0.3s forwards;letter-spacing:0.04em}
.intro-sub{font-size:0.85rem;color:var(--teal-300);opacity:0;letter-spacing:0.16em;animation:introSub 1s ease 1.4s forwards;margin-top:10px;text-transform:uppercase}
@keyframes introLogo{0%{opacity:0;transform:translateY(24px) scale(0.94);filter:blur(10px)}60%{opacity:1;filter:blur(0);transform:translateY(0) scale(1.02)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes introSub{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:none}}
@keyframes introFadeOut{0%{opacity:1}100%{opacity:0;pointer-events:none}}
.intro-fade-out{animation:introFadeOut 0.55s ease forwards}

/* ── PROFILE ── */
.profile-option{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--teal-900);border:1px solid var(--teal-800);border-radius:var(--r);cursor:pointer;transition:all 0.15s;font-size:0.9rem;font-weight:500;margin-bottom:8px}
.profile-option:hover{border-color:var(--teal-600);background:var(--teal-800)}
.profile-option.selected{border-color:var(--gold-400);background:rgba(224,149,32,0.08);color:var(--gold-200)}
.po-icon{font-size:1.3rem;width:32px;text-align:center;flex-shrink:0}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--teal-700);transition:all 0.3s}
.step-dot.active{width:20px;border-radius:3px;background:var(--gold-400)}
.step-dot.done{background:var(--teal-400)}

/* range editor in detail modal */
.range-row{display:grid;grid-template-columns:1fr 68px 68px 28px;gap:6px;align-items:center;margin-bottom:6px}
.range-row input{padding:7px 10px;font-size:0.82rem}
</style>
</head>
<body>
<div id="app">

<!-- INTRO -->
<div id="screen-intro">
  <div class="intro-glow"></div>
  <div class="intro-logo">Hifz</div>
  <div class="intro-sub">Quran Revision</div>
</div>

<!-- ONBOARDING -->
<div id="screen-onboard" class="screen" style="padding:0">
  <div style="flex:1;overflow-y:auto;padding:32px 20px 48px;max-width:560px;margin:0 auto;width:100%" id="onboard-inner"></div>
</div>

<!-- MAIN APP -->
<div id="screen-main" class="screen" style="padding:0">
  <div class="top-bar">
    <div class="logo">Hifz</div>
    <div style="display:flex;align-items:center;gap:8px" id="header-streaks"></div>
  </div>
  <div id="page-today" class="page-scroll" style="display:flex;flex-direction:column"></div>
  <div id="page-surahs" class="page-scroll" style="display:none;flex-direction:column"></div>
  <div id="page-stats" class="page-scroll" style="display:none;flex-direction:column"></div>
  <div id="page-settings" class="page-scroll" style="display:none;flex-direction:column"></div>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="showPage('today')" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>TODAY
    </button>
    <button class="nav-item" onclick="showPage('surahs')" id="nav-surahs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>SURAHS
    </button>
    <button class="nav-item" onclick="showPage('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>PROGRESS
    </button>
    <button class="nav-item" onclick="showPage('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>SETTINGS
    </button>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay hidden" id="review-modal">
  <div class="modal" style="max-width:600px"><div class="modal-handle"></div><div id="review-modal-content"></div></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay hidden" id="detail-modal">
  <div class="modal"><div class="modal-handle"></div><div id="detail-modal-content"></div></div>
</div>

<!-- RANGE GEAR MODAL -->
<div class="modal-overlay hidden" id="gear-modal">
  <div class="modal"><div class="modal-handle"></div><div id="gear-modal-content"></div></div>
</div>

<!-- ACHIEVEMENT MODAL -->
<div class="modal-overlay hidden" id="ach-modal">
  <div class="modal" style="max-width:520px"><div class="modal-handle"></div><div id="ach-modal-content"></div></div>
</div>

<div class="celebrate hidden" id="celebrate"></div>

<script>
// ═══ SURAH DATA ═══
const SD=[
  {n:1,name:"Al-Fatihah",ar:"الفاتحة",a:7,j:1},{n:2,name:"Al-Baqarah",ar:"البقرة",a:286,j:1},

// ═══ SM-2 ═══
const BOOST={good:4,ok:3,bad:2,notsure:1};
// ═══ SM-2 CONFIG ═══
// Each mode has: efStart, efMin, efBoost, forgetMult, firstGoodInterval
const SM2_PRESETS = {
  lenient:  {efStart:2.2, efMin:1.1, efBoost:0.05, forgetMult:0.5,  firstGood:4},
  standard: {efStart:2.5, efMin:1.3, efBoost:0.10, forgetMult:0.3,  firstGood:6},
  strict:   {efStart:2.7, efMin:1.5, efBoost:0.15, forgetMult:0.15, firstGood:8},
};
// Custom maps slider values (low/medium/high) to actual parameter values
const SLIDER_VALS = {
  growth:    {low:{efStart:2.2,efBoost:0.05}, medium:{efStart:2.5,efBoost:0.10}, high:{efStart:2.7,efBoost:0.15}},
  forgiving: {low:{forgetMult:0.5},           medium:{forgetMult:0.3},           high:{forgetMult:0.15}},
  floor:     {low:{efMin:1.1},                medium:{efMin:1.3},                high:{efMin:1.5}},
};

function getSM2Cfg(){
  const mode=S.srMode||'standard';
  if(mode==='custom'){
    const g=SLIDER_VALS.growth[S.srCustom?.growth||'medium'];
    const f=SLIDER_VALS.forgiving[S.srCustom?.forgiving||'medium'];
    const fl=SLIDER_VALS.floor[S.srCustom?.floor||'medium'];
    return{efStart:g.efStart,efMin:fl.efMin,efBoost:g.efBoost,forgetMult:f.forgetMult,firstGood:6};
  }
  return SM2_PRESETS[mode]||SM2_PRESETS.standard;
}

function sm2Init(statusKey){
  const b=BOOST[statusKey]||1;
  const cfg=getSM2Cfg();
  let ef=cfg.efStart,interval=1,reps=0;
  if(b>=4){interval=4;reps=2}else if(b===3){interval=1;reps=1}
  const dueNow=(b<=2);
  const d=new Date();if(!dueNow)d.setDate(d.getDate()+interval);
  return{ef,interval:dueNow?0:interval,reps,nextReview:d.toISOString().split('T')[0],lastReview:null,lastQuality:5};
}
function sm2Update(card,quality){
  const cfg=getSM2Cfg();
  let{ef,interval,reps,status}=card;
  if(quality>=3){
    if(reps===0){
      if(status==='bad'){
        interval=Math.min(2,Math.round(1+(quality/5)));
      } else {
        interval=Math.round(1+(quality-1));
      }
    } else if(reps===1){
      interval=status==='bad'?Math.min(cfg.firstGood-2,Math.round(interval*ef)):cfg.firstGood;
    } else {
      interval=Math.round(interval*ef);
    }
    reps+=1;
    // EF update using config boost
    const rawBoost=cfg.efBoost-(5-quality)*(0.08+(5-quality)*0.02);
    ef=Math.max(cfg.efMin,ef+rawBoost);
  } else {
    interval=Math.max(1,Math.round(interval*cfg.forgetMult));
    reps=Math.max(0,reps-1);
    ef=Math.max(cfg.efMin,ef-0.2);
  }
  const d=new Date();d.setDate(d.getDate()+interval);
  return{...card,ef,interval,reps,nextReview:d.toISOString().split('T')[0],lastReview:today(),lastQuality:quality};
}

function cardId(n,pi){return pi!==undefined?`${n}_p${pi}`:`${n}`}
function cardLabel(n,pi){
  const s=SD.find(x=>x.n===n);if(!s)return'';
  if(pi===undefined||!S.parts[n])return s.name;
  const p=S.parts[n][pi];
  return p?`${s.name} · ${p.label||`${p.from}–${p.to}`}`:s.name;
}
function cardAyahs(n,pi){
  const s=SD.find(x=>x.n===n);if(!s)return 0;
  if(pi===undefined||!S.parts[n])return s.a;
  const p=S.parts[n][pi];return p?(p.to-p.from+1):s.a;
}
function addCard(n,pi,statusKey){
  const id=cardId(n,pi);
  S.cards[id]={id,surahN:n,partIdx:pi,...sm2Init(statusKey),status:statusKey};
}

// ═══ STREAKS ═══
function updateStreak(targetMet){
  const t=today(),str=S.streak;
  const diff=str.lastReview?Math.round((new Date(t)-new Date(str.lastReview))/86400000):999;
  if(str.lastReview!==t){if(diff===1)str.review+=1;else if(diff>1)str.review=1;str.lastReview=t;}
  if(targetMet&&str.lastTarget!==t){
    const dt=str.lastTarget?Math.round((new Date(t)-new Date(str.lastTarget))/86400000):999;
    if(dt===1)str.target+=1;else str.target=1;str.lastTarget=t;
  }
  str.history=str.history||[];
  if(!str.history.includes(t))str.history.push(t);
  if(str.history.length>365)str.history.shift();
  // Track days the target was hit, for the calendar
  str.targetHistory=str.targetHistory||[];
  if(targetMet&&!str.targetHistory.includes(t))str.targetHistory.push(t);
  if(str.targetHistory.length>365)str.targetHistory.shift();
}

// Helper: check if a surah is fully covered (whole card OR parts summing to all ayahs)
function surahFullyCovered(s, cards, parts){
  // Whole-surah card (no parts)
  if(cards.some(c=>c.surahN===s.n&&c.partIdx===undefined&&!parts[s.n]?.length)) return true;
  // Parts covering entire surah
  if(parts[s.n]?.length){
    const covered=parts[s.n].reduce((sum,p)=>sum+(p.to-p.from+1),0);
    if(covered>=s.a) return true;
  }
  return false;
}

// Helper: count how many juz are 100% covered by ayah
function juzComplete(s, needed){
  const cards=Object.values(s.cards);
  let count=0;
  for(let j=1;j<=30;j++){
    const total=getJuzTotalAyahs(j);
    if(!total)continue;
    // Replicate getJuzMemoisedAyahs but with current s context
    let done=0;
    for(const [sn,jFrom,jTo] of (JUZ_BOUNDARIES[j]||[])){
      const surah=SD.find(x=>x.n===sn);
      if(!surah)continue;
      const surahCards=cards.filter(c=>c.surahN===sn);
      if(!surahCards.length)continue;
      if(!s.parts[sn]||!s.parts[sn].length){
        done+=(jTo-jFrom+1);
      } else {
        s.parts[sn].forEach(p=>{
          const oF=Math.max(p.from,jFrom),oT=Math.min(p.to,jTo);
          if(oT>=oF)done+=(oT-oF+1);
        });
      }
    }
    if(done>=total)count++;
    if(count>=needed)return true;
  }
  return false;
}

// Helper: check if specific ayah range (surahN, fromAyah, toAyah) is fully covered
// Covers: exact whole-surah card, range card covering those ayahs, range included in a larger range,
// or split across multiple ranges that together cover it
function rangeCovered(surahN, fromAyah, toAyah, cards, parts){
  const surahCards=cards.filter(c=>c.surahN===surahN);
  if(!surahCards.length) return false;
  // Whole surah card covers any range within it
  if(surahCards.some(c=>c.partIdx===undefined&&!parts[surahN]?.length)) return true;
  // Check parts — build list of all covered ayah ranges for this surah
  const ranges=(parts[surahN]||[]).map(p=>({from:p.from,to:p.to}));
  // Check if every ayah from fromAyah to toAyah is covered by at least one range
  for(let ayah=fromAyah; ayah<=toAyah; ayah++){
    if(!ranges.some(r=>ayah>=r.from&&ayah<=r.to)) return false;
  }
  return true;
}

// Helper: count distinct surahs in pool (whole cards or any part)
function surahsInPool(cards){
  return new Set(cards.map(c=>c.surahN)).size;
}

// Queue of achievements waiting to be shown
let _pendingAchs = [];
let _achQueueActive = false;

function checkAchs(){
  // Collect ALL newly unlocked achievements BEFORE showing any
  ACHS.forEach(def=>{
    if(!S.achievements[def.id] && def.check(S)){
      S.achievements[def.id] = today();
      _pendingAchs.push(def);
    }
  });
  save();
  // Only auto-trigger if in main app and nothing already showing
  if(!_achQueueActive && _pendingAchs.length>0 && S.onboarded){
    showNextAchievement();
  }
}

function fireConfetti(){
  try{
    const cel=document.getElementById('celebrate');
    if(!cel)return;
    cel.innerHTML='';cel.classList.remove('hidden');
    ['#4dc97a','#f0b040','#e09520','#80dda0','#f7cc7a','#b3ece8'].forEach(c=>{
      for(let i=0;i<10;i++){
        const p=document.createElement('div');
        p.className='confetti-piece';
        p.style.cssText='left:'+(Math.random()*100)+'%;top:-10px;background:'+c+';animation-delay:'+(Math.random()*0.8)+'s;animation-duration:'+(1.6+Math.random()*0.6)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px';
        cel.appendChild(p);
      }
    });
    setTimeout(function(){cel.classList.add('hidden');},2500);
  }catch(e){}
}

function showNextAchievement(){
  if(_pendingAchs.length===0){_achQueueActive=false;return;}
  _achQueueActive=true;
  const ach=_pendingAchs[0];
  const afterThis=_pendingAchs.length-1;
  const enc=ACH_ENCOURAGEMENT[ach.id]||'Keep going — your effort is noticed and rewarded.';
  fireConfetti();
  let buttons;
  if(afterThis===0){
    buttons='<button class="btn btn-primary btn-full" onclick="closeAchModal()">Alhamdulillah ✓</button>';
  } else {
    buttons='<div style="display:flex;gap:8px">'
      +'<button class="btn btn-secondary btn-sm" onclick="closeAllAchModals()">Close all</button>'
      +'<button class="btn btn-primary btn-full" onclick="advanceAchModal()">Alhamdulillah ('+afterThis+' more) →</button>'
      +'</div>';
  }
  const html='<div style="text-align:center;padding:8px 0 4px">'
    +'<div style="font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--gold-400);text-transform:uppercase;margin-bottom:14px">Achievement unlocked</div>'
    +'<div style="display:inline-flex;align-items:center;justify-content:center;width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,rgba(224,149,32,0.15),rgba(224,149,32,0.05));border:2px solid var(--gold-500);margin-bottom:14px;font-size:2.5rem;box-shadow:0 0 32px rgba(240,176,64,0.25)">'+ach.icon+'</div>'
    +'<h2 style="color:var(--gold-300);margin-bottom:6px;font-size:1.6rem">'+ach.name+'</h2>'
    +'<p style="color:var(--teal-200);font-size:0.9rem;margin-bottom:18px;line-height:1.5">'+ach.desc+'</p>'
    +'<div style="background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px 16px;margin-bottom:20px">'
    +'<p style="color:var(--gold-200);font-style:italic;font-size:0.85rem;line-height:1.6">'+enc+'</p>'
    +'</div>'
    +buttons
    +'</div>';
  const contentEl=document.getElementById('ach-modal-content');
  const modalEl=document.getElementById('ach-modal');
  if(!contentEl||!modalEl){
    // DOM not ready — retry after a short delay
    setTimeout(showNextAchievement,300);
    _achQueueActive=false;
    return;
  }
  contentEl.innerHTML=html;
  modalEl.classList.remove('hidden');
}

function advanceAchModal(){
  // Shift current and show next
  _pendingAchs.shift();
  document.getElementById('ach-modal').classList.add('hidden');
  setTimeout(showNextAchievement,200);
}

function closeAchModal(){
  _pendingAchs.shift();
  _achQueueActive=false;
  document.getElementById('ach-modal').classList.add('hidden');
}

function closeAllAchModals(){
  _pendingAchs=[];
  _achQueueActive=false;
  document.getElementById('ach-modal').classList.add('hidden');
}

// Backwards-compat stub
function celebrate(ach){
  if(!_pendingAchs.some(a=>a.id===ach.id)) _pendingAchs.push(ach);
  if(!_achQueueActive && S.onboarded) showNextAchievement();
}

// OB.sels: surahN -> {type:'whole',status} | {type:'parts',parts:[{label,from,to,status}]}
let OB={step:0,name:'',age:'',gender:'',frequency:'',purpose:[],goalType:'ayah',goalAyahs:50,goalSurahs:5,sels:{},openJuz:{}};

function obGender(){

function obPurpose(){
  const opts=[['learn','📖','Learn new surahs','Add and track surahs I\'m memorising'],['maintain','🔄','Stay on top of my hifz','Keep what I know solid'],['review','🔁','Review forgotten surahs','Recover surahs I once knew']];

// ── SURAH SELECTION STEP ──
function obSurahs(){
  const totalSel=Object.keys(OB.sels).length;
  return`${dots(7,8)}
  <div style="margin-bottom:20px">
    <h2 style="margin-bottom:4px">Mark your surahs${OB.name?', '+OB.name:''}</h2>
    <p class="muted" style="font-size:0.82rem;line-height:1.6">Tick the surahs (or whole Juz) you've memorised. For each, pick a status. You can also mark specific ayah ranges instead of a whole surah.</p>
  </div>
  <!-- colour legend -->
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
    <span class="spill sp-good" style="cursor:default">✓ Good</span>
    <span class="spill sp-ok" style="cursor:default">~ OK</span>
    <span class="spill sp-bad" style="cursor:default">✗ Bad</span>
    <span class="spill sp-notsure" style="cursor:default">? Not sure</span>
  </div>
  <div id="ob-juz-list">${buildJuzAccordion()}</div>
  <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--teal-700)">
    <div style="text-align:center;color:var(--teal-400);font-size:0.82rem;margin-bottom:12px">${totalSel} selection${totalSel!==1?'s':''} made</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="obBack()">← Back</button>
      <button class="btn btn-primary btn-full" onclick="finishOnboarding()" style="font-size:1rem;padding:15px">Start Hifz →</button>
    </div>
  </div>`;}

function buildJuzAccordion(){
  let html='';
  for(let j=1;j<=30;j++){
    const sns=JUZ_SURAHS[j]||[];
    const juzSurahs=sns.map(n=>SD.find(x=>x.n===n));
    const totalAyahs=juzSurahs.reduce((a,s)=>a+s.a,0);
    // Check juz checkbox state
    const selCount=sns.filter(n=>OB.sels[n]).length;
    const allSel=sns.length>0&&selCount===sns.length;
    const partSel=sns.length>0&&selCount>0&&selCount<sns.length;
    const cbClass=allSel?'checked':partSel?'partial':'';
    const isOpen=OB.openJuz[j];

    html+=`<div class="juz-row">
      <div class="juz-header" onclick="toggleJuzOpen(${j})">
        <div class="cb ${cbClass}" onclick="event.stopPropagation();toggleJuzAll(${j})"></div>
        <div style="flex:1">
          <div class="juz-title">Juz ${j}</div>
          <div class="juz-meta">${sns.length} surahs · ${totalAyahs} ayahs${selCount?` · <span style="color:var(--green-300)">${selCount} selected</span>`:''}</div>
        </div>
        <div class="juz-arrow ${isOpen?'open':''}">›</div>
      </div>
      <div class="juz-surahs ${isOpen?'open':''}">
        ${juzSurahs.map(s=>buildSurahRowOB(s)).join('')}
      </div>
    </div>`;
  }
  return html;
}

function buildSurahRowOB(s){
  const sel=OB.sels[s.n];
  const ticked=!!sel;
  const hasParts=sel?.type==='parts';

  let statusPills='';
  if(sel&&sel.type==='whole'){
    statusPills=`<div class="status-pills">
      ${[['good','✓ Good'],['ok','~ OK'],['bad','✗ Bad'],['notsure','? Not sure']].map(([v,l])=>`<button class="spill sp-${v} ${sel.status===v?'':'sp-unset'}" onclick="event.stopPropagation();setOBWhole(${s.n},'${v}')" style="${sel.status!==v?'background:transparent;border-color:var(--teal-700);color:var(--teal-500)':''}">${l}</button>`).join('')}
      <button class="spill" style="color:var(--gold-300);border-color:rgba(224,149,32,0.3)" onclick="event.stopPropagation();setOBParts(${s.n})">✂ Ranges</button>
    </div>`;
  }

  let partsHtml='';
  if(hasParts){
    partsHtml=`<div class="parts-section">
      ${sel.parts.map((p,i)=>`<div class="part-row-ob">
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
          <span style="font-size:10px;color:var(--teal-500)">Ayahs</span>
          <input type="number" value="${p.from}" min="1" max="${s.a}" style="width:52px;padding:4px 6px;font-size:11px;text-align:center" onchange="event.stopPropagation();setOBPartRange(${s.n},${i},'from',+this.value)" onclick="event.stopPropagation()">
          <span style="font-size:10px;color:var(--teal-500)">–</span>
          <input type="number" value="${p.to}" min="1" max="${s.a}" style="width:52px;padding:4px 6px;font-size:11px;text-align:center" onchange="event.stopPropagation();setOBPartRange(${s.n},${i},'to',+this.value)" onclick="event.stopPropagation()">
        </div>
        <div class="status-pills" style="flex:1">
          ${[['good','✓'],['ok','~'],['bad','✗'],['notsure','?']].map(([v,l])=>`<button class="spill sp-${v}" onclick="event.stopPropagation();setOBPartStatus(${s.n},${i},'${v}')" style="${p.status!==v?'background:transparent;border-color:var(--teal-700);color:var(--teal-500)':''}">${l}</button>`).join('')}
          <button class="spill" style="color:var(--err);border-color:rgba(224,90,90,0.3);font-size:11px" onclick="event.stopPropagation();removeOBPart(${s.n},${i})">✕</button>
        </div>
      </div>`).join('')}
      <button class="btn-ghost btn-sm" style="font-size:11px;color:var(--teal-300);padding:4px 8px" onclick="event.stopPropagation();addOBPart(${s.n},${s.a})">+ Add range</button>
      <button class="btn-ghost btn-sm" style="font-size:11px;color:var(--teal-400);padding:4px 8px;margin-left:4px" onclick="event.stopPropagation();setOBWhole(${s.n},'notsure')">↩ Whole surah</button>
    </div>`;
  }

  return`<div class="surah-row-ob">
    <div class="cb ${ticked?'checked':''}" onclick="toggleOBSurah(${s.n},${s.a})"></div>
    <div class="surah-row-ob-info">
      <div class="surah-row-ob-name">${s.name} <span style="font-weight:400;color:var(--teal-400);font-size:0.8rem">${s.ar}</span></div>
      <div class="surah-row-ob-meta">${s.a} ayahs</div>
      ${statusPills}
    </div>
  </div>${partsHtml}`;
}

function toggleJuzOpen(j){OB.openJuz[j]=!OB.openJuz[j];rerenderJuz();}
function rerenderJuz(){document.getElementById('ob-juz-list').innerHTML=buildJuzAccordion();}

function toggleJuzAll(j){
  const sns=JUZ_SURAHS[j]||[];
  if(!sns.length)return;
  const allSel=sns.length>0&&sns.every(n=>OB.sels[n]);
  if(allSel){sns.forEach(n=>delete OB.sels[n]);}
  else{sns.forEach(n=>{if(!OB.sels[n])OB.sels[n]={type:'whole',status:'notsure'};});}
  OB.openJuz[j]=!allSel;rerenderJuz();
}

function toggleOBSurah(n,maxA){
  if(OB.sels[n])delete OB.sels[n];
  else OB.sels[n]={type:'whole',status:'notsure'};
  rerenderJuz();
}
function setOBWhole(n,status){OB.sels[n]={type:'whole',status};rerenderJuz();}
function setOBParts(n){
  const s=SD.find(x=>x.n===n);

  rerenderJuz();

function finishOnboarding(){
  S.profile={name:OB.name,age:OB.age,gender:OB.gender,frequency:OB.frequency,purpose:OB.purpose};
  S.goalType=OB.goalType;S.goalAyahs=OB.goalAyahs;S.goalSurahs=OB.goalSurahs;
  Object.entries(OB.sels).forEach(([nStr,sel])=>{
    const n=parseInt(nStr);
    if(sel.type==='whole'){addCard(n,undefined,sel.status);}
    else if(sel.type==='parts'&&sel.parts?.length){
      S.parts[n]=sel.parts.map(p=>({label:p.label||`Ayahs ${p.from}–${p.to}`,from:+p.from,to:+p.to}));
      sel.parts.forEach((_,i)=>addCard(n,i,sel.parts[i].status||'notsure'));
    }
  });
  S.onboarded=true; save();
  // Reset queue state, then collect freshly-unlocked achievements
  _pendingAchs=[]; _achQueueActive=false;
  ACHS.forEach(def=>{
    if(!S.achievements[def.id] && def.check(S)){
      S.achievements[def.id] = today();
      _pendingAchs.push(def);
    }
  });
  save();
  showMainApp();
  // DOM is ready — show achievement queue after a settle delay
  if(_pendingAchs.length>0){
    _achQueueActive=false;
    setTimeout(showNextAchievement, 700);
  }
}

// ═══ SESSION QUEUE MANAGEMENT ═══
// Stored in S.session: { date, queue:[ids], extras:[ids], remainingDropdownOpen:bool }
// queue = today's fixed target surahs
// extras = all other due cards not in queue

function cardProgress(c){
  // how many ayahs/surahs this card contributes to daily target
  return S.goalType==='surah'?1:cardAyahs(c.surahN,c.partIdx);
}

function buildSession(){
  const t=today();
  // Already built for today? Restore from storage
  if(S.session&&S.session.date===t){
    // Filter out any ids that no longer exist
    S.session.queue=S.session.queue.filter(id=>S.cards[id]);
    S.session.extras=S.session.extras.filter(id=>S.cards[id]);
    return;
  }
  // New day — build fresh session
  const allDue=getDueCards().sort((a,b)=>a.nextReview.localeCompare(b.nextReview));
  const target=S.goalType==='surah'?S.goalSurahs:S.goalAyahs;
  let budget=target;
  const queue=[];
  const remaining=[];
  for(const c of allDue){
    const contrib=cardProgress(c);
    if(budget>0||(queue.length===0&&contrib<=target)){
      queue.push(c.id);
      budget-=contrib;
    } else {
      remaining.push(c.id);
    }
  }
  S.session={date:t,queue:[...queue],extras:[...remaining],remainingOpen:false};
  save();
}

function sessionQueuePending(){
  // queue cards not yet reviewed today
  return S.session.queue.filter(id=>S.cards[id]&&S.cards[id].lastReview!==today());
}
function sessionQueueDone(){
  return S.session.queue.filter(id=>S.cards[id]&&S.cards[id].lastReview===today());
}
function sessionExtrasPending(){
  return S.session.extras.filter(id=>S.cards[id]&&S.cards[id].lastReview!==today());
}

function targetProgress(){
  // sum of progress from all cards reviewed today that are in queue OR extras but moved to satisfy target
  const t=today();
  const reviewedIds=new Set(Object.keys(S.cards).filter(id=>S.cards[id].lastReview===t));
  let done=0;
  // count all reviewed cards (queue + extras reviewed)
  reviewedIds.forEach(id=>{ if(S.cards[id]) done+=cardProgress(S.cards[id]); });
  return done;
}

function targetGoal(){
  return S.goalType==='surah'?S.goalSurahs:S.goalAyahs;
}

function targetUnit(){
  return S.goalType==='surah'?'surahs':'ayahs';
}

function targetMet(){
  return targetProgress()>=targetGoal();
}

function onExtraReviewed(id){
  // Called after reviewing a card from the extras pile
  // Check how much the target is now satisfied with remaining queue items
  const t=today();
  const pendingQueue=S.session.queue.filter(qid=>S.cards[qid]&&S.cards[qid].lastReview!==t);
  const doneProgress=targetProgress();
  const goal=targetGoal();

  if(doneProgress>=goal){
    // Target already met — find which queue items to bump to extras
    // We want to bump items from the bottom of pendingQueue whose combined removal
    // gets us closest to exactly meeting the goal without exceeding it
    // i.e. find subset to remove from queue so doneProgress - removed >= goal
    // Strategy: greedy from bottom, remove items as long as we still meet goal
    let surplus=doneProgress-goal;
    const toMove=[];
    const pq=[...pendingQueue].reverse(); // bottom-first
    for(const qid of pq){
      const contrib=cardProgress(S.cards[qid]);
      if(surplus>=contrib){
        toMove.push(qid);
        surplus-=contrib;
      }
    }
    // Move them: remove from queue, add to front of extras
    toMove.forEach(qid=>{
      S.session.queue=S.session.queue.filter(x=>x!==qid);
      if(!S.session.extras.includes(qid)) S.session.extras.unshift(qid);
    });
    save();
  }
}

async function doAIFeedback(){
  const text=document.getElementById('ai-text')?.value?.trim();if(!text)return;
  const btn=document.getElementById('ai-submit-btn');if(btn){btn.disabled=true;btn.textContent='Analysing...';}
  document.getElementById('ai-result-area').innerHTML=`<div class="muted" style="text-align:center;padding:12px;font-size:0.85rem">Reading your description...</div>`;
  try{
    const promptText=`Quran memorisation review. Description: "${text}". Respond ONLY with valid JSON, no markdown: {"score":0.0-5.0,"label":"Good|OK|Bad|Blank","remark":"one encouraging sentence max 10 words"}. Score to ONE decimal place: 5.0=perfect fluent, 4.0=good minor hesitation, 3.0=okay some errors, 2.0=struggled many, 1.0=forgot most, 0.0=complete blank. Use decimals freely e.g. 3.7, 4.2.`;
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:promptText})});
    const d=await res.json();
    const parsed=JSON.parse(d.reply.replace(/```json|```/g,'').trim());
    const score=Math.max(0,Math.min(5,Math.round(+parsed.score*10)/10));
    document.getElementById('ai-result-area').innerHTML=`<div class="ai-result"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px"><span class="ai-score-display">${score.toFixed(1)}</span><span style="color:var(--teal-300);font-size:0.8rem">${parsed.label||''}</span></div><p style="font-size:0.85rem;color:var(--gold-200);font-style:italic;margin-bottom:12px">${parsed.remark||''}</p><button class="btn btn-primary btn-full" onclick="submitReview(${score})">Continue →</button></div>`;
  }catch(e){switchRevTab('quick');}
}
function submitReview(quality){
  const c=S.cards[curReviewId];if(!c)return;
  const qualityDisplay=quality;
  const qualityInt=Math.round(quality);
  const wasFromExtras=S.session&&S.session.extras&&S.session.extras.includes(curReviewId);

  // Track midnight review (12am–4am)
  const hr=new Date().getHours();
  if(hr>=0&&hr<4) S.midnightReview=true;

  // Leech tamer: card previously got 0 or 1, now gets 5
  if(qualityInt>=4&&c.hadLowScore) S.leechTamed=true; // Good = 5 manual OR 4.0+ AI (rounds to 4+)
  // Track if this card ever scored 0 or 1
  const updatedCard={...sm2Update(c,qualityInt)};
  if(qualityDisplay<=1) updatedCard.hadLowScore=true; // catches 0, 0.5, 1.0 from AI
  else updatedCard.hadLowScore=c.hadLowScore||false;
  S.cards[curReviewId]=updatedCard;

  // Flow state: 25 consecutive reviews scored >= threshold (5 manual, 4.0+ AI)
  // qualityDisplay is the raw score (could be decimal from AI)
  const flowPass = qualityDisplay>=4;
  S.flowStreak = flowPass ? ((S.flowStreak||0)+1) : 0;

  S.totalReviews=(S.totalReviews||0)+1;
  S.totalAyahsReviewed=(S.totalAyahsReviewed||0)+cardAyahs(c.surahN,c.partIdx);
  S.cards[curReviewId].lastQuality=qualityInt;
  // If reviewed from extras, adjust queue
  if(wasFromExtras) onExtraReviewed(curReviewId);
  const tMet=targetMet();
  updateStreak(tMet);checkAchs();save();
  // Show target modal only the first time we cross the threshold today
  const alreadyCelebrated=S.session&&S.session.celebratedDate===today();
  const justHitTarget=tMet&&!alreadyCelebrated;
  const queueNowDone=S.session&&sessionQueuePending().length===0&&justHitTarget;

function surahProgressSVG(n, totalAyahs){
  // Calculate how many ayahs are tracked for this surah
  const cards=Object.values(S.cards).filter(c=>c.surahN===n);
  if(!cards.length) return surahCircleSVG(n, 0, false);
  // Whole surah card (no parts)
  if(!S.parts[n]||!S.parts[n].length){
    return surahCircleSVG(n, 100, true);
  }
  // Parts — sum up ayahs covered
  const coveredAyahs=S.parts[n].reduce((sum,p)=>sum+(p.to-p.from+1),0);
  const pct=Math.min(100, Math.round((coveredAyahs/totalAyahs)*100));
  const full=pct>=100;
  return surahCircleSVG(n, pct, full);
}

function surahCircleSVG(n, pct, full){
  const size=36, r=16, cx=18, cy=18;
  const circumference=2*Math.PI*r; // ~100.5
  // Arc from top (12 o'clock) clockwise
  const filled=circumference*(pct/100);
  const gap=circumference-filled;
  // Gold arc colour, teal-700 track
  const trackCol='#155550';
  const arcCol=full?'#e09520':'#e09520'; // gold either way when memorised
  const numCol=full?'#f0b040':'#80ddd6';
  if(pct===0){
    // No arc at all — just the track circle
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="#103d3a" stroke="${trackCol}" stroke-width="2.5"/>
      <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="600" fill="#80ddd6" font-family="Inter,sans-serif">${n}</text>
    </svg>`;
  }
  // Offset so arc starts at top: rotate -90deg around centre
  // stroke-dashoffset trick: dasharray = filled gap, offset = 0 starts at 3 o'clock
  // To start at 12 o'clock we use transform rotate(-90)
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#103d3a" stroke="${trackCol}" stroke-width="2.5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${arcCol}" stroke-width="2.5"
      stroke-dasharray="${filled} ${gap}"
      stroke-dashoffset="0"
      transform="rotate(-90 ${cx} ${cy})"
      stroke-linecap="round"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="600" fill="${numCol}" font-family="Inter,sans-serif">${n}</text>
  </svg>`;
}

let _fullSurahStatus=null;
function selectFullSurahStatus(k){
  _fullSurahStatus=k;
  ['good','ok','bad'].forEach(s=>{
    const b=document.getElementById(`fsbtn-${s}`);
    if(!b)return;
    b.style.borderColor=s===k?'var(--gold-400)':'var(--teal-600)';

}
function confirmUpgradeFullSurah(n){
  if(!_fullSurahStatus)return;
  const s=SD.find(x=>x.n===n);
  const parts=S.parts[n]||[];
  const cards=parts.map((_,i)=>S.cards[cardId(n,i)]).filter(Boolean);
  const totalExistingAyahs=parts.reduce((sum,p)=>sum+(p.to-p.from+1),0);
  const newAyahs=s.a-totalExistingAyahs;
  // Weighted average of all existing cards
  const totalWeight=s.a; // full surah
  let blendedEF=0, blendedInterval=0, blendedReps=0;
  cards.forEach((c,i)=>{
    const w=parts[i]?(parts[i].to-parts[i].from+1):0;
    blendedEF+=c.ef*w;
    blendedInterval+=c.interval*w;
    blendedReps+=c.reps*w;
  });
  const newEF={good:2.5,ok:2.1,bad:1.4}[_fullSurahStatus]||1.4;
  const newInterval={good:4,ok:1,bad:0}[_fullSurahStatus]||0;
  const newReps={good:2,ok:1,bad:0}[_fullSurahStatus]||0;
  blendedEF=(blendedEF+newEF*newAyahs)/totalWeight;
  blendedInterval=(blendedInterval+newInterval*newAyahs)/totalWeight;
  blendedReps=(blendedReps+newReps*newAyahs)/totalWeight;
  blendedEF=Math.max(1.3,Math.round(blendedEF*100)/100);
  blendedInterval=Math.max(0,Math.round(blendedInterval));
  blendedReps=Math.floor(blendedReps);
  // Remove all part cards and parts array
  Object.keys(S.cards).filter(id=>S.cards[id].surahN===n).forEach(id=>delete S.cards[id]);
  delete S.parts[n];
  // Add single whole-surah card with blended stats
  const d=new Date();
  if(blendedInterval>0)d.setDate(d.getDate()+blendedInterval);
  const id=cardId(n,undefined);
  S.cards[id]={id,surahN:n,partIdx:undefined,ef:blendedEF,interval:blendedInterval,reps:blendedReps,
    nextReview:d.toISOString().split('T')[0],lastReview:null,lastQuality:5,status:_fullSurahStatus};
  _fullSurahStatus=null;
  checkAchs();save();closeModal('detail-modal');renderSurahsList();renderToday();
}

  });

  if(btn){btn.disabled=false;btn.style.opacity='1';}
}

function saveNewRange(n,maxA){
  if(!_newRangeStatus){alert('Please select a status first.');return;}
  const label=document.getElementById('new-label')?.value?.trim()||'';
  const from=Math.max(1,Math.min(maxA,parseInt(document.getElementById('new-from')?.value)||1));
  const to=Math.max(from,Math.min(maxA,parseInt(document.getElementById('new-to')?.value)||maxA));
  // Check for overlap with existing parts
  const overlaps=[];
  (S.parts[n]||[]).forEach(other=>{
    const oFrom=Math.max(from,other.from);
    const oTo=Math.min(to,other.to);
    if(oTo>=oFrom){overlaps.push(other);}
  });
  if(overlaps.length){
    const msg=overlaps.map(o=>`"${o.label||`Ayahs ${o.from}–${o.to}`}"`).join(', ');
    if(!confirm(`This range overlaps with: ${msg}. The overlapping ayahs will end up in multiple ranges. Continue anyway?`))return;
  }
  if(!S.parts[n])S.parts[n]=[];
  const newIdx=S.parts[n].length;
  S.parts[n].push({label:label||`Ayahs ${from}–${to}`,from,to});
  addCard(n,newIdx,_newRangeStatus);
  _newRangeStatus=null;
  checkAchs();save();
  openPartsEditor(n);
}

let _incStatus=null;
let _incOverlapAcked=false;
function selectIncStatus(k){
  _incStatus=k;
  ['good','ok','bad'].forEach(s=>{
    const b=document.getElementById(`incbtn-${s}`);
    if(!b)return;
    b.style.background=s===k?'rgba(255,255,255,0.07)':'';
    b.style.borderColor=s===k?'var(--gold-400)':'rgba(255,255,255,0.08)';
  });

  if(btn){btn.disabled=false;btn.style.opacity='1';}

function saveIncrease(n,pi,maxA){
  if(!_incStatus)return;
  const errEl=document.getElementById('inc-error');
  const showErr=(msg)=>{if(errEl)errEl.textContent=msg;};
  const rawFrom=parseInt(document.getElementById('inc-from')?.value);
  const rawTo=parseInt(document.getElementById('inc-to')?.value);
  if(isNaN(rawFrom)||isNaN(rawTo)){showErr('From and to ayahs must be numbers.');return;}
  if(rawFrom<1||rawTo>maxA){showErr(`Range must be within ayahs 1–${maxA} for this surah.`);return;}
  if(rawFrom>rawTo){showErr('From ayah cannot be greater than to ayah.');return;}
  const newFrom=rawFrom, newTo=rawTo;
  const p=S.parts[n][pi];
  if(newFrom>p.from||newTo<p.to){showErr('Cannot shrink the range here. Use Decrease for shrinking.');return;}
  if(newFrom===p.from&&newTo===p.to){showErr('No change made — please extend the range to save.');return;}
  const oldAyahs=p.to-p.from+1;
  const newAyahs=newTo-newFrom+1;
  const addedAyahs=newAyahs-oldAyahs;
  if(addedAyahs<=0){showErr('New range must be larger than current range. Use Decrease for shrinking.');return;}
  // Check for overlap with other parts of the same surah
  const overlaps=[];
  (S.parts[n]||[]).forEach((other,idx)=>{
    if(idx===pi)return;
    const oFrom=Math.max(newFrom,other.from);
    const oTo=Math.min(newTo,other.to);
    if(oTo>=oFrom){overlaps.push({other,idx,oFrom,oTo});}
  });
  if(overlaps.length&&!_incOverlapAcked){
    const msg=overlaps.map(o=>`"${o.other.label||`Ayahs ${o.other.from}–${o.other.to}`}"`).join(', ');
    if(!confirm(`This range overlaps with: ${msg}. The overlapping ayahs will end up in multiple ranges. Continue anyway?`))return;
    _incOverlapAcked=true;
  }
  _incOverlapAcked=false;
  const cid=cardId(n,pi);
  const c=S.cards[cid];
  if(c){
    // Weighted average: old weight = oldAyahs, new weight = addedAyahs
    const newStatusBoost={good:4,ok:3,bad:2}[_incStatus]||2;
    const newEF={good:2.5,ok:2.1,bad:1.4}[_incStatus]||1.4;
    const newInterval={good:4,ok:1,bad:0}[_incStatus]||0;
    const wOld=oldAyahs, wNew=addedAyahs, wTotal=newAyahs;
    const blendedEF=Math.max(1.3,((c.ef*wOld)+(newEF*wNew))/wTotal);
    const blendedInterval=Math.round(((c.interval*wOld)+(newInterval*wNew))/wTotal);
    const blendedReps=Math.floor(((c.reps*wOld)+(Math.min(1,newStatusBoost-1)*wNew))/wTotal);
    const d=new Date();
    if(blendedInterval>0)d.setDate(d.getDate()+blendedInterval);
    S.cards[cid]={...c,ef:blendedEF,interval:blendedInterval,reps:blendedReps,nextReview:d.toISOString().split('T')[0]};
  }
  S.parts[n][pi]={...p,from:newFrom,to:newTo,label:p.label||`Ayahs ${newFrom}–${newTo}`};
  _incStatus=null;
  save();closeModal('gear-modal');openPartsEditor(n);
}

function saveSplit(n,pi){
  const p=S.parts[n][pi];
  const cid=cardId(n,pi);
  const originalCard=S.cards[cid]?{...S.cards[cid]}:null;
  const rows=document.querySelectorAll('#split-rows .range-row');
  const newParts=[];
  rows.forEach((_,i)=>{
    const label=document.getElementById(`spl-${i}`)?.value?.trim()||`Part ${i+1}`;
    const from=parseInt(document.getElementById(`spf-${i}`)?.value)||p.from;
    const to=parseInt(document.getElementById(`spt-${i}`)?.value)||p.to;
    newParts.push({label,from,to});
  });
  if(newParts.length<2){showSplitError('Need at least 2 parts to split.');return;}
  // Sort by from
  newParts.sort((a,b)=>a.from-b.from);
  // Validate: no part goes outside original range
  for(const np of newParts){
    if(np.from<p.from||np.to>p.to){showSplitError(`Part "${np.label}" (${np.from}–${np.to}) goes outside the original range (${p.from}–${p.to}).`);return;}
    if(np.from>np.to){showSplitError(`Part "${np.label}": from ayah (${np.from}) cannot be greater than to ayah (${np.to}).`);return;}
  }
  // Validate: no gaps and no overlaps — parts must be contiguous and cover exactly p.from to p.to
  for(let i=0;i<newParts.length;i++){
    if(i===0&&newParts[i].from!==p.from){showSplitError(`Parts must start at ayah ${p.from} (first part starts at ${newParts[i].from}).`);return;}
    if(i===newParts.length-1&&newParts[i].to!==p.to){showSplitError(`Parts must end at ayah ${p.to} (last part ends at ${newParts[i].to}).`);return;}
    if(i>0&&newParts[i].from!==newParts[i-1].to+1){showSplitError(`Gap or overlap between parts: part ${i} ends at ${newParts[i-1].to} but part ${i+1} starts at ${newParts[i].from}. Parts must be consecutive.`);return;}
  }
  // Remove original card and part entry
  delete S.cards[cid];
  S.parts[n].splice(pi,1);
  // Insert new parts at the same position
  newParts.reverse().forEach(np=>{
    S.parts[n].splice(pi,0,{label:np.label,from:np.from,to:np.to});
  });
  // Rebuild all cards for this surah (indices may have shifted)
  Object.keys(S.cards).filter(id=>S.cards[id].surahN===n).forEach(id=>delete S.cards[id]);
  S.parts[n].forEach((pt,i)=>{
    const isNewPart=newParts.some(np=>np.from===pt.from&&np.to===pt.to&&np.label===pt.label);
    if(isNewPart&&originalCard){
      // Both new parts get exact same progress as original
      S.cards[cardId(n,i)]={...originalCard,id:cardId(n,i),surahN:n,partIdx:i};
    } else if(S.cards[cardId(n,i)]===undefined){
      // Other existing parts — restore from a fresh card with notsure (shouldn't normally happen)
      addCard(n,i,'notsure');
    }
  });
  // Re-add cards for any other parts that existed before (not touched by split)
  // Actually re-add all untouched parts properly
  // Better: rebuild entire cards array for this surah preserving non-split parts
  // Find which indices are NOT new parts and re-create from scratch if missing
  S.parts[n].forEach((pt,i)=>{
    if(!S.cards[cardId(n,i)]) addCard(n,i,'notsure');
  });
  save();closeModal('gear-modal');openPartsEditor(n);
}

function getJuzTotalAyahs(j){
  return (JUZ_BOUNDARIES[j]||[]).reduce((sum,[,f,t])=>sum+(t-f+1),0);
}

function getJuzMemoisedAyahs(j){
  let count=0;
  for(const [sn,jFrom,jTo] of (JUZ_BOUNDARIES[j]||[])){
    const surah=SD.find(x=>x.n===sn);
    if(!surah)continue;
    const cards=Object.values(S.cards).filter(c=>c.surahN===sn);
    if(!cards.length)continue;
    // Whole surah card
    if(!S.parts[sn]||!S.parts[sn].length){
      // Count only the ayahs within this juz's slice of the surah
      count+=(jTo-jFrom+1);
    } else {
      // Parts — intersect each part with this juz slice
      S.parts[sn].forEach(p=>{
        const overlapFrom=Math.max(p.from,jFrom);
        const overlapTo=Math.min(p.to,jTo);
        if(overlapTo>=overlapFrom) count+=(overlapTo-overlapFrom+1);
      });
    }
  }
  return count;
}

    }
    return`<div style="width:100%;aspect-ratio:1;border-radius:4px;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1">
      <div style="font-size:11px;font-weight:600;color:${dayCol}">${day}</div>
      <div style="font-size:7px;font-weight:600;color:${monCol};letter-spacing:0.04em;margin-top:1px;text-transform:uppercase">${mon}</div>
    </div>`;
  }).join('');
  // Most recent 5 achievements + fill remaining slots with locked ones
  const unlockedAchs=ACHS.filter(def=>S.achievements[def.id])
    .sort((a,b)=>(S.achievements[b.id]||'').localeCompare(S.achievements[a.id]||''));
  const lockedAchs=ACHS.filter(def=>!S.achievements[def.id]);
  const recentAchs=unlockedAchs.slice(0,5);
  // Fill up to 5 slots with locked achievements
  const displaySlots=[...recentAchs];
  for(let i=0;i<lockedAchs.length&&displaySlots.length<5;i++) displaySlots.push({...lockedAchs[i],_locked:true});
  const achRowHtml=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">${displaySlots.map(def=>{
    if(def._locked){
      return`<div style="background:var(--teal-900);border:1px solid var(--teal-800);border-radius:var(--r-sm);padding:10px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;opacity:0.35;filter:grayscale(1)">
        <div style="font-size:1.4rem;line-height:1">${def.icon}</div>
        <div style="font-size:9px;font-weight:500;color:var(--teal-400);line-height:1.3">${def.name}</div>
      </div>`;
    }
    return`<div style="background:var(--teal-800);border:1px solid var(--gold-500);border-radius:var(--r-sm);padding:10px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="font-size:1.4rem;line-height:1">${def.icon}</div>
      <div style="font-size:9px;font-weight:500;color:var(--gold-200);line-height:1.3">${def.name}</div>
    </div>`;
  }).join('')}</div>`;
  const juzHtml=Array.from({length:30},(_,i)=>i+1).map(j=>{
    const total=getJuzTotalAyahs(j);
    let done=getJuzMemoisedAyahs(j);
    if(done>total)done=total; // cap numerator at denominator
    const pct=total?Math.round((done/total)*100):0;
    const barCol=pct===100?'var(--green-400)':'var(--gold-400)';
    return`<div style="display:grid;grid-template-columns:44px 1fr 90px;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--teal-400)">Juz ${j}</span>
      <div class="prog-bar-wrap">
        <div style="height:100%;border-radius:4px;background:${barCol};transition:width 0.5s;width:${pct}%"></div>
      </div>
      <span style="font-size:11px;color:${pct===100?'var(--green-300)':'var(--teal-400)'};text-align:right;font-variant-numeric:tabular-nums">${done}/${total} · ${pct}%</span>
    </div>`;
  }).join('');
  document.getElementById('page-stats').innerHTML=`<div style="padding:0 20px 20px">
    <div style="padding-top:16px"></div>
    <div class="section-header" style="padding-top:0"><h3>Last 30 days</h3></div>
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;padding:12px;background:var(--teal-900);border:1px solid var(--teal-800);border-radius:var(--r);margin-bottom:16px">${calHtml}</div>
    <div class="section-header"><h3>Juz progress</h3></div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">${juzHtml}</div>
    <div class="section-header"><h3>Achievements</h3><button class="btn btn-ghost btn-sm" onclick="showAllAchievements()" style="font-size:11px;padding:4px 10px">See all (${unlockedAchs.length}/${ACHS.length}) →</button></div>${achRowHtml}
  </div>`;
}

function showAllAchievements(){
  const sorted=[...ACHS].sort((a,b)=>{
    const ua=S.achievements[a.id], ub=S.achievements[b.id];
    if(ua&&!ub)return -1;
    if(!ua&&ub)return 1;
    if(ua&&ub)return ub.localeCompare(ua);
    return 0;
  });
  const list=sorted.map(def=>{
    const u=S.achievements[def.id];
    return `<div class="achievement ${u?'ach-unlocked':'ach-locked'}" style="margin-bottom:6px">
      <div class="ach-icon">${def.icon}</div>
      <div><div style="font-weight:500;font-size:0.9rem">${def.name}</div><div style="font-size:11px;color:var(--teal-400);margin-top:2px">${def.desc}${u?` · Earned ${u}`:''}</div></div>
    </div>`;
  }).join('');
  document.getElementById('detail-modal-content').innerHTML=`
    <h2 style="color:var(--gold-300);margin-bottom:6px">All achievements</h2>
    <p class="muted" style="margin-bottom:14px;font-size:0.85rem">${Object.keys(S.achievements).length} of ${ACHS.length} unlocked</p>
    ${list}
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="closeModal('detail-modal')">Close</button>`;
  document.getElementById('detail-modal').classList.remove('hidden');
}

// ═══ SETTINGS ═══

          <div>
            <span style="font-size:0.85rem;font-weight:600;color:${(S.srMode||'standard')==='custom'?'var(--gold-200)':'var(--cream)'}">Custom</span>
            <span style="font-size:11px;color:${(S.srMode||'standard')==='custom'?'var(--gold-400)':'var(--teal-400)'};margin-left:8px">Fine-tune each parameter yourself</span>
          </div>
          <span style="color:var(--teal-400);font-size:12px">${S.srCustomOpen?'▾':'▸'}</span>
        </button>
        ${S.srCustomOpen?`<div style="border:1px solid var(--teal-700);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);padding:14px 12px;display:flex;flex-direction:column;gap:14px;background:rgba(0,0,0,0.15)">
          ${[
            ['growth','Growth rate','How fast intervals increase on good reviews','Slow','Medium','Fast'],
            ['forgiving','Forgiveness','How much a bad review sets you back','Lenient','Balanced','Harsh'],
            ['floor','Difficulty floor','How low the ease factor can drop','Low','Medium','High']
          ].map(([key,label,desc,lo,mid,hi])=>`
            <div>
              <div style="margin-bottom:6px">
                <span style="font-size:0.85rem;font-weight:500;color:var(--cream)">${label}</span>

              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">
                ${[['low',lo],['medium',mid],['high',hi]].map(([v,lbl])=>{
                  const isActive=(S.srCustom||{})[key]===v;

      <p style="font-size:10px;color:var(--teal-500);margin-top:10px">Changes apply to future reviews only — your existing schedule is not affected.</p>
    </div>

          onchange="S.goalSurahs=parseInt(this.value)||5;save()">`}

      <div class="setting-row"><div><div style="font-size:0.9rem;font-weight:500">Import progress</div><div class="muted" style="font-size:0.8rem">Restore from a Hifz backup file</div></div><button class="btn btn-secondary btn-sm" onclick="importData()">Import</button></div>
      <input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(this)">
      <div class="setting-row" style="border:none"><div><div style="font-size:0.9rem;font-weight:500;color:var(--err)">Reset all data</div><div class="muted" style="font-size:0.8rem">Wipes everything</div></div><button class="btn btn-danger btn-sm" onclick="resetApp()">Reset</button></div>
    </div>
    <div style="text-align:center;padding-top:8px"><p class="muted" style="font-size:0.75rem">Hifz — SM-2 spaced repetition<br>Data stored locally in your browser</p></div>
  </div>`;}

function setSRMode(mode){
  S.srMode=mode;
  save();
  renderSettings();
}
function setSRSlider(key,val){
  if(!S.srCustom)S.srCustom={growth:'medium',forgiving:'medium',floor:'medium'};
  S.srCustom[key]=val;
  save();
  renderSettings();
}
function toggleSRInfo(m){
  S.srInfoOpen=(S.srInfoOpen===m)?null:m;
  save();
  renderSettings();
}
function toggleSRCustom(){
  S.srCustomOpen=!S.srCustomOpen;
  // Selecting Custom also sets it as the active mode
  if(S.srCustomOpen) S.srMode='custom';
  save();
  renderSettings();
}
function exportData(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hifz-backup.json';a.click();}

function importData(){
  // Reset input so same file can be re-selected after an error
  const inp=document.getElementById('import-file-input');
  inp.value='';
  inp.click();
}

function handleImportFile(input){
  const file=input.files[0];
  if(!file)return;
  // Basic format check
  if(!file.name.endsWith('.json')&&file.type!=='application/json'){
    showImportError('Invalid file type. Please select a .json backup file exported from Hifz.');
    return;
  }
  if(file.size>10*1024*1024){
    showImportError('File is too large to be a valid Hifz backup.');
    return;
  }
  const reader=new FileReader();
  reader.onload=function(e){
    let parsed;
    try{parsed=JSON.parse(e.target.result);}
    catch(err){
      showImportError('Could not read file — it does not appear to be valid JSON.');
      return;
    }
    // Validate structure
    const problems=validateImport(parsed);
    if(problems.length){
      showImportError('This file is not a valid Hifz backup:\n\n'+problems.join('\n'));
      return;
    }
    // Ask for confirmation before overwriting
    showImportConfirm(parsed);
  };
  reader.onerror=function(){
    showImportError('Could not read the file. Please try again.');
  };
  reader.readAsText(file);
}

function validateImport(data){
  const errs=[];
  if(typeof data!=='object'||Array.isArray(data)||data===null){
    errs.push('• File does not contain a valid data object.');
    return errs;
  }
  // Must have core keys
  if(typeof data.onboarded==='undefined') errs.push('• Missing "onboarded" field — this does not look like a Hifz backup.');
  if(typeof data.cards==='undefined') errs.push('• Missing "cards" field.');
  if(typeof data.streak==='undefined') errs.push('• Missing "streak" field.');
  if(errs.length) return errs;
  // cards must be an object with valid entries
  if(typeof data.cards!=='object'||Array.isArray(data.cards)){
    errs.push('• "cards" field is not a valid object.');
  } else {
    const cardVals=Object.values(data.cards);
    const badCards=cardVals.filter(c=>typeof c.surahN!=='number'||typeof c.ef!=='number'||typeof c.interval!=='number');
    if(badCards.length>0) errs.push(`• ${badCards.length} card(s) have invalid structure.`);
    const invalidSurahs=cardVals.filter(c=>c.surahN<1||c.surahN>114);
    if(invalidSurahs.length>0) errs.push(`• ${invalidSurahs.length} card(s) reference invalid surah numbers (must be 1–114).`);
  }
  // parts must be object if present
  if(data.parts&&(typeof data.parts!=='object'||Array.isArray(data.parts))){
    errs.push('• "parts" field is invalid.');
  }
  // streak basic check
  if(typeof data.streak.review!=='number'||typeof data.streak.target!=='number'){
    errs.push('• "streak" field is missing required values.');
  }
  // goal type check
  if(data.goalType&&!['ayah','surah'].includes(data.goalType)){
    errs.push('• "goalType" must be "ayah" or "surah".');
  }
  return errs;
}

function showImportError(msg){
  document.getElementById('detail-modal-content').innerHTML=`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:2.5rem;margin-bottom:14px">❌</div>
      <h2 style="color:var(--err);margin-bottom:12px">Import failed</h2>
      <div style="background:var(--err-bg);border:1px solid rgba(224,90,90,0.3);border-radius:var(--r);padding:14px;margin-bottom:20px;text-align:left">
        <p style="font-size:0.85rem;color:#f09090;line-height:1.7;white-space:pre-line">${msg}</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-secondary btn-full" onclick="importData();closeModal('detail-modal')">Try a different file</button>
        <button class="btn btn-ghost btn-full" onclick="closeModal('detail-modal')">Cancel</button>
      </div>
    </div>`;
  document.getElementById('detail-modal').classList.remove('hidden');
}

function showImportConfirm(parsed){
  const cardCount=Object.keys(parsed.cards||{}).length;
  const surahCount=new Set(Object.values(parsed.cards||{}).map(c=>c.surahN)).size;
  const reviewCount=parsed.totalReviews||0;
  const name=parsed.profile?.name?`${parsed.profile.name}'s`:'this';
  document.getElementById('detail-modal-content').innerHTML=`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:2.5rem;margin-bottom:14px">📥</div>
      <h2 style="color:var(--gold-300);margin-bottom:8px">Import backup?</h2>
      <p style="color:var(--teal-200);font-size:0.88rem;margin-bottom:14px">Found ${name} Hifz backup:</p>
      <div style="background:var(--teal-800);border:1px solid var(--teal-700);border-radius:var(--r);padding:14px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--gold-300)">${cardCount}</div><div style="font-size:10px;color:var(--teal-400);margin-top:2px;text-transform:uppercase">Cards</div></div>
        <div style="text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--gold-300)">${surahCount}</div><div style="font-size:10px;color:var(--teal-400);margin-top:2px;text-transform:uppercase">Surahs</div></div>
        <div style="text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--gold-300)">${reviewCount}</div><div style="font-size:10px;color:var(--teal-400);margin-top:2px;text-transform:uppercase">Reviews</div></div>
      </div>
      <p style="color:var(--err);font-size:0.82rem;font-weight:500;margin-bottom:20px">⚠ This will replace your current data. This cannot be undone.</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary btn-full" onclick="confirmImport(${JSON.stringify(JSON.stringify(parsed)).slice(1,-1).replace(/"/g,'&quot;')})" style="padding:14px">Import and replace my data</button>
        <button class="btn btn-ghost btn-full" onclick="closeModal('detail-modal')">Cancel</button>
      </div>
    </div>`;
  // Store parsed data on window to avoid inline JSON escaping issues
  window._pendingImport=parsed;
  // Replace button with safe version
  document.querySelector('#detail-modal-content .btn-primary').onclick=confirmImport;
  document.getElementById('detail-modal').classList.remove('hidden');
}

function confirmImport(){
  const parsed=window._pendingImport;
  if(!parsed)return;
  // Merge defaults for any missing fields to ensure forward compat
  const merged={...defaultState(),...parsed};
  // Ensure sub-objects are complete
  merged.streak={...defaultState().streak,...(parsed.streak||{})};
  merged.cards=parsed.cards||{};
  merged.parts=parsed.parts||{};
  merged.achievements=parsed.achievements||{};
  merged.profile=parsed.profile||{};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
  window._pendingImport=null;
  location.reload();
}
function resetApp(){
  document.getElementById('detail-modal-content').innerHTML=`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:2.5rem;margin-bottom:14px">⚠️</div>
      <h2 style="color:var(--err);margin-bottom:8px">Reset all data?</h2>
      <p style="color:var(--teal-200);font-size:0.9rem;line-height:1.7;margin-bottom:6px">This will permanently delete your entire revision history, streaks, achievements, and all tracked surahs.</p>
      <p style="color:var(--err);font-size:0.85rem;font-weight:500;margin-bottom:24px">This cannot be undone.</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-danger btn-full" onclick="confirmReset()" style="padding:14px;font-size:0.95rem">Yes, delete everything</button>
        <button class="btn btn-ghost btn-full" onclick="closeModal('detail-modal')">Cancel — keep my data</button>
      </div>
    </div>`;
  document.getElementById('detail-modal').classList.remove('hidden');
}
function confirmReset(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ═══ INIT ═══
(function init(){
  load();
  const intro=document.getElementById('screen-intro');
  setTimeout(()=>{
    intro.style.animation='introFadeOut 0.55s ease forwards';
    setTimeout(()=>{
      intro.classList.add('done');
      if(S.onboarded){showMainApp();}
      else{document.getElementById('screen-onboard').classList.add('active');OB.step=0;renderOnboard();}
    },550);
  },2400);
})();
</script>
